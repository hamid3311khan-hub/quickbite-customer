<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Login - QuickBite</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{background:#f8f9fa}
    .card{max-width:450px; margin:80px auto; border-radius:15px}
    .logo{font-size:28px; font-weight:bold; color:#ff5722; text-align:center; margin-bottom:20px}
</style>
</head>
<body>

<div class="container">
    <div class="card shadow p-4">
        <div class="logo">🍔 QuickBite Partner</div>
        <h4 class="text-center mb-3">Restaurant Login</h4>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">Login</button>
        </form>

        <div id="msg" class="mt-3"></div>
        <p class="text-center mt-3">Naya restaurant hai? <a href="/restaurant-register">Register karo</a></p>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true;
    btn.innerText = "Checking...";

    const data = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };

    const res = await fetch('/api/restaurant/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
    });
    const result = await res.json();

    if(result.success){
        // Login success hua to data localStorage me save kar le
        localStorage.setItem('owner', JSON.stringify(result.owner));
        window.location.href = '/restaurant-dashboard'; // Dashboard pe bhej de
    } else {
        document.getElementById('msg').innerHTML = `<div class="alert alert-danger">${result.msg}</div>`;
        btn.disabled = false;
        btn.innerText = "Login";
    }
});
</script>

</body>
</html>
