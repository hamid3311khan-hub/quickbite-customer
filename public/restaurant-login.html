<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Login - Eat4Bite™</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{background:linear-gradient(135deg,#ff6600,#ff3300); min-height:100vh; display:flex; align-items:center;}
   .card{max-width:450px; margin:auto; border-radius:15px; border:none;}
   .logo{font-size:28px; font-weight:bold; color:#ff6600; text-align:center; margin-bottom:20px}
   .back-home{position:absolute; top:20px; left:20px; color:white; text-decoration:none; font-weight:bold;}
</style>
</head>
<body>

<a href="/" class="back-home">← Back to Home</a>

<div class="container">
    <div class="card shadow p-4">
        <div class="logo">🍴 Eat4Bite™ Partner</div>
        <h4 class="text-center mb-3">Restaurant Login</h4>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
                <div class="text-end mt-1">
                    <a href="#" onclick="alert('Admin se contact karo password reset ke liye')" style="font-size:13px;">Forgot Password?</a>
                </div>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">Login</button>
        </form>

        <div id="msg" class="mt-3"></div>
        <hr>
        <p class="text-center">Naya restaurant hai? <a href="/restaurant-register" class="fw-bold">Register karo</a></p>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true;
    btn.innerText = "Checking...";

    const data = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };

    try{
        const res = await fetch('/api/restaurant/login', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();

        if(result.success){
            if(result.owner.status!== 'Approved'){
                document.getElementById('msg').innerHTML = `<div class="alert alert-warning">⚠️ Tumhara restaurant abhi Admin se approve nahi hua. Thoda wait karo.</div>`;
                btn.disabled = false;
                btn.innerText = "Login";
                return;
            }
            // FIX: ALAG ALAG KEY ME SAVE KIYA
            localStorage.setItem('restaurantId', result.owner.restaurantId);
            localStorage.setItem('restaurantName', result.owner.restaurantName);
            localStorage.setItem('restaurantOwner', JSON.stringify(result.owner)); // purana wala bhi rakha
            window.location.href = '/restaurant-dashboard';
        } else {
            document.getElementById('msg').innerHTML = `<div class="alert alert-danger">${result.msg}</div>`;
            btn.disabled = false;
            btn.innerText = "Login";
        }
    }catch(err){
        document.getElementById('msg').innerHTML = `<div class="alert alert-danger">Server Error: ${err.message}</div>`;
        btn.disabled = false;
        btn.innerText = "Login";
    }
});
</script>
</body>
</html>
