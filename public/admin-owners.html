<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Eat4Bite™ Restaurant Approval</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{background:#f8f9fa}
   .badge-pending{background:#ffc107}
   .badge-trial{background:#0dcaf0}
   .badge-active{background:#198754}
   .proof-img{width:80px; height:80px; object-fit:cover; cursor:pointer; border-radius:5px; border:1px solid #ddd}
   .navbar-brand{color:#ff4d4d !important; font-weight:bold}
</style>
</head>
<body>

<nav class="navbar bg-dark navbar-dark px-3">
    <a class="navbar-brand" href="/admin">🍴 Eat4Bite™ ← Back to Admin</a>
</nav>

<div class="container mt-4">
    <h3>🏪 Restaurant Approval Requests</h3>
    <p class="text-muted">₹200 dene wale restaurant owners yahan dikhenge. Approve karne ke baad 30 din ka trial start hoga.</p>

    <div class="table-responsive">
    <table class="table table-bordered bg-white shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Restaurant</th>
                <th>Owner</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>₹200 Proof</th>
                <th>Trial End</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="ownersTable">
            <tr><td colspan="8" class="text-center">Loading...</td></tr>
        </tbody>
    </table>
    </div>
</div>

<footer class="text-center mt-5 mb-3 text-muted">
    <small>© 2026 Eat4Bite™. All rights reserved.</small>
</footer>

<script>
const API = '';

async function loadOwners(){
    try{
        const res = await fetch(API+'/api/restaurant/owners');
        const owners = await res.json();

        if(owners.length === 0){
            document.getElementById('ownersTable').innerHTML = `<tr><td colspan="8" class="text-center">Koi request nahi hai</td></tr>`;
            return;
        }

        let rows = '';
        owners.forEach(o => {
            let badge = o.status === 'Pending'? 'badge-pending' : o.plan_status === 'Trial'? 'badge-trial' : 'badge-active';
            
            let actionBtn = o.status === 'Pending'
               ? `<button class="btn btn-sm btn-success" onclick="approveOwner('${o._id}')">✅ Approve</button> <button class="btn btn-sm btn-danger" onclick="rejectOwner('${o._id}')">❌ Reject</button>`
                : o.status === 'Approved'
               ? `<span class="text-success fw-bold">Approved</span>`
                : `<span class="text-danger">Rejected</span>`;

            let proofLink = o.payment_proof 
                ? `<a href="/uploads/${o.payment_proof}" target="_blank">
                     <img src="/uploads/${o.payment_proof}" class="proof-img" onerror="this.src='https://via.placeholder.com/80x80/cccccc/ffffff?text=No+Proof'">
                   </a>` 
                : '<span class="text-muted">-</span>';
            
            let trialEnd = o.trial_end_date ? new Date(o.trial_end_date).toLocaleDateString('hi-IN') : '-';

            rows += `
            <tr>
                <td><b>${o.restaurantName}</b><br><small class="text-muted">${o.address || ''}</small></td>
                <td>${o.ownerName}</td>
                <td>${o.email}</td>
                <td>${o.mobile}</td>
                <td>${proofLink}</td>
                <td>${trialEnd}</td>
                <td><span class="badge ${badge}">${o.status}</span></td>
                <td>${actionBtn}</td>
            </tr>`;
        });
        document.getElementById('ownersTable').innerHTML = rows;
    }catch(err){
        document.getElementById('ownersTable').innerHTML = `<tr><td colspan="8" class="text-center text-danger">Data load nahi hua</td></tr>`;
        console.log(err)
    }
}

async function approveOwner(id){
    if(!confirm('Pakka Approve karna hai? 30 Din ka trial start ho jayega.')) return;
    const res = await fetch(API+`/api/restaurant/owner/${id}/approve`, {method:'PUT'});
    const result = await res.json();
    if(result.success){
        alert('Restaurant Approved ho gaya! Trial Active');
        loadOwners();
    } else {
        alert('Error: '+result.msg);
    }
}

async function rejectOwner(id){
    if(!confirm('Pakka Reject karna hai?')) return;
    const res = await fetch(API+`/api/restaurant/owner/${id}`, {method:'DELETE'});
    const result = await res.json();
    if(result.success){
        alert('Restaurant Reject kiya gaya!');
        loadOwners();
    }
}

loadOwners();
</script>
</body>
</html>
