<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Restaurant Approval</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{background:#f8f9fa}
   .badge-pending{background:#ffc107}
   .badge-trial{background:#0dcaf0} /* CHANGE 1: NAYA BADGE */
   .badge-active{background:#198754} /* CHANGE 2: NAME CHANGE */
   .proof-img{width:80px; cursor:pointer} /* NAYA CSS */
</style>
</head>
<body>

<nav class="navbar bg-dark navbar-dark px-3">
    <a class="navbar-brand" href="/admin">← Back to Admin</a>
</nav>

<div class="container mt-4">
    <h3>🏪 Restaurant Approval Requests</h3>
    <p class="text-muted">₹200 dene wale owners yahan dikhenge. Approve karne ke baad 30 din ka trial start hoga.</p> <!-- CHANGE 3 -->

    <table class="table table-bordered bg-white shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Restaurant</th>
                <th>Owner</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>₹200 Proof</th> <!-- CHANGE 4: NAYA COLUMN -->
                <th>Trial End</th> <!-- CHANGE 5: NAYA COLUMN -->
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="ownersTable">
            <tr><td colspan="8" class="text-center">Loading...</td></tr> <!-- CHANGE 6: colspan 8 -->
        </tbody>
    </table>
</div>

<script>
const API = '';

async function loadOwners(){
    const res = await fetch(API+'/api/restaurant/owners');
    const owners = await res.json();

    if(owners.length === 0){
        document.getElementById('ownersTable').innerHTML = `<tr><td colspan="8" class="text-center">Koi request nahi hai</td></tr>`; // CHANGE 7
        return;
    }

    let rows = '';
    owners.forEach(o => {
        let badge = o.plan_status === 'Trial'? 'badge-trial' : o.plan_status === 'Active'? 'badge-active' : 'badge-pending'; // CHANGE 8
        let actionBtn = o.plan_status === 'Trial'
           ? `<button class="btn btn-sm btn-success" onclick="approveOwner('${o._id}')">✅ Approve</button> <button class="btn btn-sm btn-danger" onclick="rejectOwner('${o._id}')">❌ Reject</button>`
            : o.plan_status === 'Active'
           ? `<span class="text-success fw-bold">Active</span>` // CHANGE 9
            : `<span class="text-muted">Pending</span>`;

        let proofLink = o.payment_proof ? `<a href="/uploads/${o.payment_proof}" target="_blank"><img src="/uploads/${o.payment_proof}" class="proof-img"></a>` : '-'; // CHANGE 10
        
        let trialEnd = o.trial_end_date ? new Date(o.trial_end_date).toLocaleDateString('hi-IN') : '-'; // CHANGE 11

        rows += `
        <tr>
            <td><b>${o.restaurantName}</b></td>
            <td>${o.ownerName}</td>
            <td>${o.email}</td>
            <td>${o.mobile}</td>
            <td>${proofLink}</td> <!-- CHANGE 12 -->
            <td>${trialEnd}</td> <!-- CHANGE 13 -->
            <td><span class="badge ${badge}">${o.plan_status}</span></td> <!-- CHANGE 14 -->
            <td>${actionBtn}</td>
        </tr>`;
    });
    document.getElementById('ownersTable').innerHTML = rows;
}

async function approveOwner(id){
    if(!confirm('Pakka Approve karna hai? 30 Din ka trial start ho jayega.')) return; // CHANGE 15
    const res = await fetch(API+`/api/restaurant/owner/${id}/approve`, {method:'PUT'});
    const result = await res.json();
    if(result.success){
        alert('Restaurant Approved ho gaya! Trial Active');
        loadOwners();
    } else {
        alert('Error: '+result.msg);
    }
}

async function rejectOwner(id){
    if(!confirm('Pakka Reject karna hai?')) return;
    const res = await fetch(API+`/api/restaurant/owner/${id}`, {method:'DELETE'});
    const result = await res.json();
    if(result.success){
        alert('Restaurant Reject kiya gaya!');
        loadOwners();
    }
}

loadOwners();
</script>
</body>
</html>
