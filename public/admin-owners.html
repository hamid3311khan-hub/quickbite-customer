<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Restaurant Approval</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{background:#f8f9fa}
    .badge-pending{background:#ffc107}
    .badge-paid{background:#0dcaf0}
    .badge-approved{background:#198754}
</style>
</head>
<body>

<nav class="navbar bg-dark navbar-dark px-3">
    <span class="navbar-brand">QuickBite Admin Panel</span>
</nav>

<div class="container mt-4">
    <h3>Restaurant Approval Requests</h3>
    <p class="text-muted">Payment karne wale owners yahan dikhenge. Approve karne ke baad hi wo login kar payenge.</p>
    
    <table class="table table-bordered bg-white shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Restaurant</th>
                <th>Owner</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="ownersTable">
            <tr><td colspan="6" class="text-center">Loading...</td></tr>
        </tbody>
    </table>
</div>

<script>
async function loadOwners(){
    const res = await fetch('/api/admin/owners');
    const owners = await res.json();
    
    if(owners.length === 0){
        document.getElementById('ownersTable').innerHTML = `<tr><td colspan="6" class="text-center">Koi request nahi hai</td></tr>`;
        return;
    }

    let rows = '';
    owners.forEach(o => {
        let badge = o.status === 'Pending' ? 'badge-pending' : o.status === 'Paid' ? 'badge-paid' : 'badge-approved';
        let actionBtn = o.status === 'Paid' 
            ? `<button class="btn btn-sm btn-success" onclick="approveOwner('${o._id}')">Approve</button>` 
            : o.status === 'Approved' 
            ? `<span class="text-success">Approved</span>` 
            : `<span class="text-muted">Payment Pending</span>`;

        rows += `
        <tr>
            <td>${o.restaurantName}</td>
            <td>${o.name}</td>
            <td>${o.email}</td>
            <td>${o.mobile}</td>
            <td><span class="badge ${badge}">${o.status}</span></td>
            <td>${actionBtn}</td>
        </tr>`;
    });
    document.getElementById('ownersTable').innerHTML = rows;
}

async function approveOwner(id){
    if(!confirm('Pakka Approve karna hai?')) return;
    const res = await fetch(`/api/admin/approve-owner/${id}`, {method:'PUT'});
    const result = await res.json();
    if(result.success){
        alert('Restaurant Approved ho gaya!');
        loadOwners();
    }
}

loadOwners();
</script>

</body>
</html>
