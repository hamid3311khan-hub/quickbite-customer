<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Registration - QuickBite</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{background:#f8f9fa}
    .card{max-width:600px; margin:50px auto; border-radius:15px}
    .logo{font-size:28px; font-weight:bold; color:#ff5722; text-align:center; margin-bottom:20px}
</style>
</head>
<body>

<div class="container">
    <div class="card shadow p-4">
        <div class="logo">🍔 QuickBite Partner</div>
        <h4 class="text-center mb-3">Restaurant Registration</h4>
        <p class="text-center text-muted">Registration Fee: ₹2000 One Time + ₹200 yearly maintenance</p>

        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">Owner Ka Naam</label>
                <input type="text" id="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <input type="tel" id="mobile" class="form-control" pattern="[0-9]{10}" maxlength="10" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Restaurant Ka Naam</label>
                <input type="text" id="restaurantName" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Restaurant Address</label>
                <textarea id="address" class="form-control" rows="2" required></textarea>
            </div>

            <button type="submit" class="btn btn-warning w-100 fw-bold">Register & Pay ₹2000</button>
        </form>

        <div id="msg" class="mt-3"></div>
        <p class="text-center mt-3">Pehle se account hai? <a href="/restaurant-login">Login karo</a></p>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true;
    btn.innerText = "Registering...";
    document.getElementById('msg').innerHTML = '';

    const data = {
        ownerName: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        mobile: document.getElementById('mobile').value,
        restaurantName: document.getElementById('restaurantName').value,
        address: document.getElementById('address').value,
        restaurantId: document.getElementById('restaurantName').value.toLowerCase().replace(/ /g,'-') // moms-kitchen
    };

    try {
        const res = await fetch('/api/restaurant/register', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();

        if(result.success){
            document.getElementById('msg').innerHTML = `<div class="alert alert-success">✅ Register ho gaya! 
            Fee: ₹2000 + ₹200/year maintenance. 
            Ab Admin ke Approval ka wait karo. Approve hote hi login kar payoge.</div>`;
            document.getElementById('registerForm').reset();
        } else {
            document.getElementById('msg').innerHTML = `<div class="alert alert-danger">❌ ${result.msg}</div>`;
        }
    } catch(err) {
        document.getElementById('msg').innerHTML = `<div class="alert alert-danger">Server Error: ${err.message}</div>`;
    }

    btn.disabled = false;
    btn.innerText = "Register & Pay ₹2000";
});
</script>

</body>
</html>
