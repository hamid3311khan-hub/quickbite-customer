<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Registration - QuickBite</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{background:#f8f9fa}
   .card{max-width:600px; margin:50px auto; border-radius:15px}
   .logo{font-size:28px; font-weight:bold; color:#ff5722; text-align:center; margin-bottom:20px}
   .qr-box{background:#FFF3CD; padding:15px; border-radius:10px; border:1px dashed #ff5722}
</style>
</head>
<body>

<div class="container">
    <div class="card shadow p-4">
        <div class="logo">🍔 QuickBite Partner</div>
        <h4 class="text-center mb-3">Restaurant Registration</h4>
        <p class="text-center text-success fw-bold">Offer: 30 Din Free Trial + ₹200 Registration</p>

        <form id="registerForm" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Owner Ka Naam</label>
                <input type="text" id="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <input type="tel" id="mobile" class="form-control" pattern="[0-9]{10}" maxlength="10" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Restaurant Ka Naam</label>
                <input type="text" id="restaurantName" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Restaurant Address</label>
                <textarea id="address" class="form-control" rows="2" required></textarea>
            </div>

            <!-- UPI + Upload Section -->
            <div class="qr-box mb-3">
                <h6 class="fw-bold">Step 1: ₹200 UPI karein</h6>
                <div class="text-center">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=tanbalkhi2014-3@okhdfcbank&pn=QuickBite&am=200"
                    width="180" alt="UPI QR" style="border-radius:10px; border:1px solid #ccc;">
                    <p class="mb-1 mt-2">UPI ID: <b>tanbalkhi2014-3@okhdfcbank</b></p>
                </div>
                <h6 class="fw-bold mt-3">Step 2: Payment Screenshot Upload Karein</h6>
                <input type="file" id="payment_proof" name="payment_proof" class="form-control" accept="image/*" required>
            </div>

            <button type="submit" class="btn btn-warning w-100 fw-bold">Register & Start Free Trial</button>
        </form>

        <div id="msg" class="mt-3"></div>
        <p class="text-center mt-3">Pehle se account hai? <a href="/restaurant-login">Login karo</a></p>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true;
    btn.innerText = "Registering...";
    document.getElementById('msg').innerHTML = '';

    const formData = new FormData();
    formData.append('ownerName', document.getElementById('name').value);
    formData.append('email', document.getElementById('email').value);
    formData.append('password', document.getElementById('password').value);
    formData.append('mobile', document.getElementById('mobile').value);
    formData.append('restaurantName', document.getElementById('restaurantName').value);
    formData.append('address', document.getElementById('address').value);
    formData.append('payment_proof', document.getElementById('payment_proof').files[0]);
    formData.append('restaurantId', document.getElementById('restaurantName').value.toLowerCase().replace(/ /g,'-'));

    try {
        const res = await fetch('/api/restaurant/register', {
            method: 'POST',
            body: formData
        });
        const result = await res.json();

        if(result.success){
            document.getElementById('msg').innerHTML = `<div class="alert alert-success">✅ Register ho gaya!
            30 Din Free Trial shuru. ₹200 baad me adjust hoga.
            Admin ke Approval ka wait karo.</div>`;
            document.getElementById('registerForm').reset();
        } else {
            document.getElementById('msg').innerHTML = `<div class="alert alert-danger">❌ ${result.msg}</div>`;
        }
    } catch(err) {
        document.getElementById('msg').innerHTML = `<div class="alert alert-danger">Server Error: ${err.message}</div>`;
    }

    btn.disabled = false;
    btn.innerText = "Register & Start Free Trial";
});
</script>

</body>
</html>
