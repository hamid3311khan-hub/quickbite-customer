<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Restaurants - QuickBite</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.card:hover{transform: scale(1.02); transition: 0.2s;}
</style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark" style="background:#ff5722;">
  <div class="container">
    <a class="navbar-brand text-white fw-bold" href="/">← QuickBite</a>
  </div>
</nav>

<div class="container py-4">
  <h3 class="mb-4">🍽️ Choose Restaurant</h3>
  <div id="restaurantList" class="row g-3"></div>
</div>

<script>
async function loadRestaurants(){
    try{
        const res = await fetch('/api/restaurants');
        const shops = await res.json();
        const list = document.getElementById('restaurantList');
        list.innerHTML = '';

        if(shops.length === 0){
            list.innerHTML = '<p class="text-center">Abhi koi restaurant approved nahi hai</p>';
            return;
        }

        shops.forEach(shop => {
            list.innerHTML += `
            <div class="col-md-4 col-12">
                <div class="card shadow-sm p-3" onclick="window.location.href='/?shop=${shop.id}'" style="cursor:pointer">
                    <img src="https://via.placeholder.com/400x180/ff6600/ffffff?text=${encodeURIComponent(shop.name)}" 
                         class="card-img-top mb-2" 
                         style="height:180px; object-fit:cover; border-radius:8px">
                    <h5 class="fw-bold">${shop.name}</h5>
                    <p class="text-muted small">📍 ${shop.address || 'Address not added'}</p>
                </div>
            </div>`;
        });
    }catch(err){
        document.getElementById('restaurantList').innerHTML = '<p class="text-center text-danger">Restaurants load nahi ho paaye</p>';
        console.log(err)
    }
}
loadRestaurants();
</script>
</body>
</html>
