<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Restaurants - QuickBite</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/index">← Back to Menu</a>
  </div>
</nav>

<div class="container py-4">
  <h3 class="mb-4">Choose Restaurant</h3>
  <div id="restaurantList" class="row g-3"></div>
</div>

<script>
async function loadRestaurants(){
    const res = await fetch('/api/restaurants');
    const shops = await res.json();
    const list = document.getElementById('restaurantList');
    list.innerHTML = '';

    if(shops.length === 0){
        list.innerHTML = '<p class="text-center">Abhi koi restaurant approved nahi hai</p>';
        return;
    }

    shops.forEach(shop => {
        list.innerHTML += `
        <div class="col-md-4">
            <div class="card shadow-sm p-3" onclick="window.location.href='/index?shop=${shop.id}'" style="cursor:pointer">
                <img src="${shop.image}" class="card-img-top mb-2" style="height:180px; object-fit:cover; border-radius:8px" onerror="this.src='https://via.placeholder.com/400x180/ff6600/ffffff?text=QuickBite'">
                <h5>${shop.name}</h5>
                <p class="text-muted">${shop.address}</p>
            </div>
        </div>`;
    });
}
loadRestaurants();
</script>
</body>
</html>
