<!DOCTYPE html><html><head><title>QuickBite</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:linear-gradient(135deg,#ff6600,#ff3300);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.box{background:white;padding:40px;border-radius:20px;text-align:center;width:350px;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
h1{color:#ff6600;font-size:40px;margin-bottom:10px} 
.btn{display:block;width:100%;padding:15px;margin:15px 0;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer;text-decoration:none;transition:0.3s}
.cust{background:#ff6600;color:white} 
.admin{background:#333;color:white} 
.track{color:#ff6600;text-decoration:none}
.btn:hover{transform:scale(1.05)}
</style>
</head><body>
<div class="box">
    <h1>🍔 QuickBite</h1>
    <p style="color:#666;margin-bottom:20px">Restaurant Online Ordering</p>
    
    <a href="/restaurants" class="btn btn-warning btn-lg">🍽️ More Restaurants</a>

    <a href="/index" class="btn cust">Order Food - Customer</a>
    <a href="/admin" class="btn admin">🔒 Restaurant Panel / Admin Login</a>
    <a href="/track" class="track">Track Your Order</a>
</div>
</body></html>
