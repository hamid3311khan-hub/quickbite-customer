<!DOCTYPE html><html lang="hi"><head><title>Eat4Bite™ - Khana 4 Minute Me</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:linear-gradient(135deg,#ff4d4d,#cc0000);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.box{background:white;padding:40px;border-radius:20px;text-align:center;width:380px;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
h1{color:#ff4d4d;font-size:40px;margin-bottom:5px} 
.tagline{color:#666;margin-bottom:20px;font-size:14px;font-weight:bold}
.btn{display:block;width:100%;padding:15px;margin:10px 0;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;text-decoration:none;transition:0.3s}
.cust{background:#ff4d4d;color:white} 
.admin{background:#333;color:white} 
.owner{background:#ffc107;color:#000}
.rider{background:#28a745;color:white}
.track{color:#ff4d4d;text-decoration:none;display:block;margin-top:15px}
.btn:hover{transform:scale(1.05)}
.footer{margin-top:20px;font-size:12px;color:#999}
</style>
</head><body>
<div class="box">
    <h1>🍴 Eat4Bite™</h1>
    <p class="tagline">Khana 4 Minute Me</p>
    
    <a href="/restaurants" class="btn cust">🍽️ Order Food - Customer</a>
    <a href="/track" class="btn btn-outline-warning">📍 Track Your Order</a>

    <hr style="margin:20px 0">

    <a href="/restaurant-register" class="btn owner">🏪 Restaurant Register</a>
    <a href="/restaurant-login" class="btn owner">🏪 Restaurant Login</a>
    
    <a href="/admin" class="btn admin">👑 Admin Panel</a>
    <a href="/admin-owners" class="btn admin">✅ Approve Restaurants</a>

    <a href="/rider-register" class="btn rider">🛵 Join as Rider</a>
    <a href="/rider" class="btn rider">🚴 Rider Login</a>

    <div class="footer">© 2026 Eat4Bite™. All rights reserved.</div>
</div>
</body></html>
