<!DOCTYPE html><html><head><title>Track Order - QuickBite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*{margin:0;font-family:Arial} 
nav{background:#ff5722;color:white;padding:15px;text-align:center;font-size:20px;font-weight:bold}
.container{max-width:700px;margin:20px auto;padding:15px}
.card{border:2px solid #ff6600;padding:20px;border-radius:10px;background:#fff; margin-bottom:15px}
.timeline{display:flex; justify-content:space-between; margin:20px 0; position:relative}
.timeline::before{content:''; position:absolute; top:15px; left:0; right:0; height:3px; background:#ddd; z-index:0}
.step{text-align:center; z-index:1; width:25%}
.step .dot{width:30px; height:30px; border-radius:50%; background:#ddd; margin:0 auto 5px; line-height:30px; color:white}
.step.active .dot{background:#28a745} .step.active p{font-weight:bold; color:#28a745}
#map{height:300px; width:100%; border-radius:10px; margin-top:10px; background:#f0f0f0}
.btn{padding:12px;margin:5px 0;width:100%;border:none;border-radius:8px;font-size:16px;cursor:pointer;color:white;background:#25D366}
.error{border:2px solid red;background:#ffe6e6;padding:15px;border-radius:10px}
</style>
</head><body>
<nav>🔥 QuickBite Order Tracking</nav>

<div class="container">
<div id="orderBox" class="card">Loading Order...</div>

<div id="trackingBox" class="card">
    <h3>🚚 Live Tracking</h3>
    <p><b>Current Status:</b> <span id="currentStatus">Pending</span></p>
    <div class="timeline">
        <div class="step" id="s1"><div class="dot">1</div><p>Pending</p></div>
        <div class="step" id="s2"><div class="dot">2</div><p>Preparing</p></div>
        <div class="step" id="s3"><div class="dot">3</div><p>Out for Delivery</p></div>
        <div class="step" id="s4"><div class="dot">4</div><p>Delivered</p></div>
    </div>
    <div id="map"></div>
    <small style="color:#666">* Rider location admin update karega</small>
</div>

<a id="waBtn" href="#" target="_blank"><button class="btn">📞 Contact Us on WhatsApp</button></a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = 'https://quickbite-ymqk.onrender.com/api'; 
const urlParams = new URLSearchParams(window.location.search);
const trackId = urlParams.get('id');
let map; 

async function loadOrder(){
    if(!trackId) return document.getElementById('orderBox').innerHTML="<div class='error'><h3>Invalid Order ID</h3></div>";
    
    try{
        const res = await fetch(`${API}/orders/track/${trackId}`);
        const orderData = await res.json();
        if(!orderData || !orderData.trackId) return document.getElementById('orderBox').innerHTML="<div class='error'><h3>Order not found</h3></div>";
        
        document.getElementById('orderBox').innerHTML = `
            <h2>Order: ${orderData.trackId}</h2>
            <p><b>Name:</b> ${orderData.name}</p>
            <p><b>Phone:</b> ${orderData.phone}</p>
            <p><b>Address:</b> ${orderData.address}</p>
            <p><b>Total Paid:</b> ₹${orderData.total} | <b>Payment:</b> ${orderData.payment}</p>
            <p><b>Points Earned:</b> ${orderData.pointsEarned || 0} ⭐</p>
            <hr style="margin:10px 0">
            <p><b>Items:</b><br> ${orderData.items.map(i=>`• ${i.name} x${i.qty} - ₹${i.price}`).join('<br>')}</p>
        `;
        
        document.getElementById('currentStatus').innerText = orderData.status;
        const steps = ['Pending', 'Preparing', 'Out for Delivery', 'Delivered'];
        const index = steps.indexOf(orderData.status);
        for(let i=1; i<=index+1; i++) document.getElementById('s'+i).classList.add('active');
        
        initMap(orderData.riderLat, orderData.riderLng);
        document.getElementById('waBtn').href = `https://wa.me/918207836370?text=Help for order ${orderData.trackId} - Status: ${orderData.status}`;
    } catch(e){
        document.getElementById('orderBox').innerHTML="<div class='error'><h3>Server Error. Refresh karo</h3></div>";
    }
}

function initMap(lat, lng) {
    const defaultLoc = { lat: 23.3441, lng: 85.3096 }; // Ranchi default
    const location = [parseFloat(lat) || defaultLoc.lat, parseFloat(lng) || defaultLoc.lng];
    
    if(!map){
        map = L.map('map').setView(location, 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
    } else {
        map.setView(location, 15);
    }
    
    if(window.riderMarker) map.removeLayer(window.riderMarker);
    window.riderMarker = L.marker(location).addTo(map).bindPopup("Rider Location").openPopup();
}
loadOrder();
setInterval(loadOrder, 10000); // 10 sec me refresh
</script>
</body></html>
