<!DOCTYPE html>
<html>
<head>
  <title>My Order - QuickBite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
   .order { background: white; padding: 15px; border-radius: 8px; border-left: 5px solid #ff6b00; }
   .btn { background: #ff6b00; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
   .status { background: #4CAF50; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>📋 My Last Order</h1>
  <button class="btn" onclick="loadMyOrder()">🔄 Check Status</button>
  <div id="myorder" style="margin-top:15px;">Loading...</div>

  <script>
    async function loadMyOrder(){
      const res = await fetch('https://quickbite-ymqk.onrender.com/api/orders'); // FULL URL
      const orders = await res.json();
      const div = document.getElementById('myorder');
      if(orders.length === 0) div.innerHTML = "<p>Koi order nahi hai</p>";
      else {
        const o = orders[0]; // sabse latest order
        div.innerHTML = `<div class="order">
          <h3>Status: <span class="status">${o.status}</span></h3>
          <p><b>Order #:</b> ${o._id.slice(-6)}</p>
          <p><b>Total:</b> ₹${o.total}</p>
          <p><b>Items:</b> ${o.items.map(i=>i.name).join(', ')}</p>
          <small>${new Date(o.createdAt).toLocaleString('en-IN')}</small>
        </div>`;
      }
    }
    loadMyOrder();
  </script>
</body>
</html>
