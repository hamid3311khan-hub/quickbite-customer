<!DOCTYPE html>
<html>
<head>
  <title>My Order - QuickBite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <h1>📋 My Order</h1>
  <div id="myorder">Loading...</div>
  <script>
    // Abhi ke liye last order dikha dega
    fetch('/api/orders').then(res => res.json()).then(orders => {
      const div = document.getElementById('myorder');
      if(orders.length === 0) div.innerHTML = "<p>Koi order nahi hai</p>";
      else {
        const lastOrder = orders[0]; // sabse naya order
        div.innerHTML = `
          <div style="background:white; padding:15px; border-radius:8px;">
            <h3>Status: ${lastOrder.status}</h3>
            <p><b>Total:</b> ₹${lastOrder.total}</p>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
