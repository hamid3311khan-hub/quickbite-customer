<!DOCTYPE html>
<html>
<head>
  <title>My Order - QuickBite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <h1>📋 My Last Order</h1>
  <div id="myorder">Loading...</div>

  <script>
    fetch('https://quickbite-ymqk.onrender.com/api/orders')
    .then(res => res.json())
    .then(orders => {
      const div = document.getElementById('myorder');
      if(orders.length === 0) div.innerHTML = "<p>Koi order nahi hai</p>";
      else {
        const o = orders[0];
        div.innerHTML = `<div style="background:white; padding:15px; border-radius:8px;">
          <h3>Status: ${o.status}</h3>
          <p><b>Total:</b> ₹${o.total}</p>
        </div>`;
      }
    });
  </script>
</body>
</html>
