<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Restaurants</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">← Back to Menu</a>
  </div>
</nav>

<div class="container py-4">
  <h3 class="mb-4">Choose Restaurant</h3>
  <div id="restaurantList" class="row g-3">
    <p>Loading...</p>
  </div>
</div>

<script>
async function loadRestaurants(){
    const res = await fetch('/api/restaurants');
    const shops = await res.json();
    const list = document.getElementById('restaurantList');
    list.innerHTML = '';
    
    shops.forEach(shop => {
        list.innerHTML += `
        <div class="col-md-4">
            <div class="card p-3" onclick="window.location.href='index.html?shop='+shop.id" style="cursor:pointer">
                <h5>${shop.name}</h5>
                <p>${shop.address}</p>
            </div>
        </div>`;
    });
}
loadRestaurants();
</script>
</body>
</html>
