<!DOCTYPE html><html><head><title>QuickBite Menu</title><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;font-family:Arial} 
body.dark{background:#121212;color:#eee}
body.dark .card, body.dark .search-bar{background:#1e1e1e;color:#eee}
body.dark .cat-btn{background:#333;color:#ff6600;border-color:#ff6600}
nav{background:#ff6600;color:white;padding:15px;display:flex;justify-content:space-between;position:sticky;top:0;z-index:100} 
nav a{color:white;text-decoration:none;margin:0 10px;font-weight:bold} 
.banner{background:linear-gradient(90deg,#ff6600,#ff3300);color:white;text-align:center;padding:15px;font-size:18px;font-weight:bold}
.search-bar{padding:15px;background:white;position:sticky;top:55px;z-index:99}
.search-bar input{width:95%;padding:10px;border-radius:20px;border:1px solid #ddd}
.categories{display:flex;gap:10px;padding:10px 0;overflow-x:auto}
.cat-btn{padding:8px 16px;border:2px solid #ff6600;border-radius:20px;background:white;color:#ff6600;cursor:pointer;white-space:nowrap}
.cat-btn.active{background:#ff6600;color:white}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;padding:20px;background:#f8f8f8} 
body.dark .grid{background:#121212}
.card{background:white;border-radius:10px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1);position:relative} 
.card img{width:100%;height:180px;object-fit:cover;border-radius:8px} 
.price{color:#ff6600;font-size:20px;font-weight:bold} 
button{background:#ff6600;color:white;border:none;padding:10px 15px;border-radius:5px;cursor:pointer} 
button:disabled{background:#ccc;cursor:not-allowed}
input{width:95%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:5px} 
.back-btn{background:#666;margin:10px} 
.out-stock{position:absolute;top:10px;right:10px;background:red;color:white;padding:5px 10px;border-radius:5px;font-size:12px}
.reorder-btn{background:#28a745;margin-top:10px;width:100%}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style></head><body>

<nav>
    <div><a href="/">🏠 Home</a> <a href="/track">📦 Track</a> <a href="/admin">🔒 Admin</a></div>
    <div>
        <button onclick="toggleDark()">🌙</button>
        <button onclick="showCart()">Cart (<span id="count">0</span>)</button>
    </div>
</nav>

<div class="banner">🔥 50% OFF on First Order - CODE: FIRST50 🔥</div>

<div class="search-bar">
    <input id="search" placeholder="🔍 Search Pizza, Burger..." onkeyup="filterItems()">
    <div class="categories" id="categories"></div>
</div>

<div class="grid" id="menu"><p style="text-align:center">Loading...</p></div>

<script>
const API = 'https://quickbite-ymqk.onrender.com/api'; 
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let allItems = []; 
let currentCat = 'All';

if(localStorage.getItem('dark')=='true') document.body.classList.add('dark');
function toggleDark(){
    document.body.classList.toggle('dark');
    localStorage.setItem('dark', document.body.classList.contains('dark'));
}

fetch(`${API}/menu`).then(res=>res.json()).then(items=>{
    allItems = items;
    loadCategories();
    displayItems(items);
    checkReorder();
}).catch(()=>{document.getElementById('menu').innerHTML="<h3>Server Error</h3>"})

function loadCategories(){
    const cats = ['All', ...new Set(allItems.map(i=>i.category || 'Other'))];
    document.getElementById('categories').innerHTML = cats.map((c,idx)=>`<button class="cat-btn" onclick="setCat('${c}', this)">${c}</button>`).join('');
    document.querySelector('.cat-btn').classList.add('active');
}
function setCat(cat, btn){
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filterItems();
}
function filterItems(){
    const search = document.getElementById('search').value.toLowerCase();
    let filtered = allItems.filter(i=> currentCat=='All' || (i.category || 'Other')==currentCat);
    filtered = filtered.filter(i=> i.name.toLowerCase().includes(search) || (i.desc && i.desc.toLowerCase().includes(search)));
    displayItems(filtered);
}

function displayItems(items){
    if(items.length==0) document.getElementById('menu').innerHTML="<h3 style='text-align:center;width:100%;padding:50px'>No items found</h3>"
    else document.getElementById('menu').innerHTML = items.map(item=>{
        const price = item.offer? Math.round(item.price*(1-item.offer/100)) : item.price;
        return `
        <div class="card">
            ${item.inStock===false ? '<div class="out-stock">Out of Stock</div>' : ''}
            <img src="${item.img}">
            <h3>${item.name} ${item.offer?`<span style="color:red;background:#ffe0e0;padding:2px 6px;border-radius:4px">-${item.offer}%</span>`:''}</h3>
            <p style="color:#666">${item.desc}</p>
            <p style="font-size:12px;color:#888">${item.category || 'Other'}</p>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
                <span class="price">₹${price}</span>
                <button onclick='addToCart(${JSON.stringify(item)})' ${item.inStock===false?'disabled':''}>${item.inStock===false?'Sold Out':'Add +'}</button>
            </div>
        </div>`
    }).join('')
}

function addToCart(item){ 
    if(item.inStock===false) return alert("Ye item stock me nahi hai");
    const price = item.offer? Math.round(item.price*(1-item.offer/100)) : item.price; 
    const ex = cart.find(i=>i._id==item._id); 
    if(ex) ex.qty++; 
    else cart.push({...item, price, qty:1}); 
    localStorage.setItem('cart', JSON.stringify(cart)); 
    updateCart(); 
    alert(item.name + " added to cart!") 
}
function updateCart(){ 
    document.getElementById('count').innerText = cart.reduce((s,i)=>s+i.qty,0); 
}
function showCart(){
    if(cart.length==0) return alert("Cart khali hai");
    window.location = '/cart';
} 

function checkReorder(){
    const lastOrder = JSON.parse(localStorage.getItem('lastOrder') || '[]');
    if(lastOrder.length>0){
        const banner = document.createElement('div');
        banner.innerHTML = `<button class="reorder-btn" onclick="reorder()">🔄 Order Again: ${lastOrder.map(i=>i.name).join(', ')}</button>`;
        document.querySelector('.search-bar').appendChild(banner);
    }
}
function reorder(){
    const lastOrder = JSON.parse(localStorage.getItem('lastOrder') || '[]');
    if(lastOrder.length==0) return alert('No previous order');
    cart = [...lastOrder]; // purana hata ke naya
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCart();
    alert("✅ Previous order added to cart!");
    window.location = '/cart';
}
updateCart();
</script></body></html>
