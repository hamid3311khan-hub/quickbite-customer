<!DOCTYPE html>
<html>
<head>
  <title>QuickBite - Order Food</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .item { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; }
    .item img { width: 80px; height: 80px; border-radius: 5px; }
    button { background: #ff6b00; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 5px; }
    #cart { position: fixed; top: 20px; right: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <h1>🍔 QuickBite Customer</h1>
  
  <div id="cart">
    Cart: <span id="cart-count">0</span> items
    <br>
    <button onclick="placeOrder()">Order Now</button>
  </div>

  <div id="menu">Loading menu...</div>

  <script src="menu.js"></script>
</body>
</html>
