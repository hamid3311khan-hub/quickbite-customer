<!DOCTYPE html>
<html>
<head>
  <title>QuickBite - Order Food</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .item { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    .item img { width: 80px; height: 80px; border-radius: 5px; margin-right: 10px; }
    button { background: #ff6b00; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    #cart { position: fixed; top: 20px; right: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 999; }
  </style>
</head>
<body>
  <h1>🍔 QuickBite Customer</h1>
  
  <div id="cart">
    Cart: <span id="cart-count">0</span> items
    <br>
    <button onclick="placeOrder()">Order Now</button>
  </div>

  <div id="menu">Loading menu...</div>

  <script>
    let cart = [];

    async function loadMenu() {
      try {
        const res = await fetch('/api/products'); 
        const data = await res.json();
        
        if(data.length === 0){
          document.getElementById('menu').innerHTML = "<p>No items in DB</p>";
          return;
        }

        document.getElementById('menu').innerHTML = data.map(item => 
          `<div class="item">
            <div style="display:flex">
              <img src="${item.image}">
              <div>
                <h3>${item.name}</h3>
                <p>₹${item.price}</p>
                <p style="color:green">${item.offer}</p>
              </div>
            </div>
            <button onclick='addToCart("${item.name}", ${item.price})'>Add</button>
          </div>`
        ).join('');

      } catch (error) {
        document.getElementById('menu').innerHTML = "<p>Error: API not working</p>";
      }
    }

    function addToCart(name, price){
      cart.push({name, price});
      document.getElementById('cart-count').innerText = cart.length;
    }

    async function placeOrder(){
      if(cart.length === 0) return alert("Cart empty hai bhai");
      const total = cart.reduce((sum, item) => sum + item.price, 0);
      await fetch('/api/orders', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({items: cart, total: total})
      });
      alert("Order Placed! Total: ₹" + total);
      cart = [];
      document.getElementById('cart-count').innerText = 0;
    }

    loadMenu(); // page load hote hi
  </script>
</body>
</html>
