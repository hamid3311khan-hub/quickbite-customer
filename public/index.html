<!DOCTYPE html><html lang="hi"><head><title>Eat4Bite™ Menu</title><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
*{margin:0;font-family:Arial} 
body.dark{background:#121212;color:#eee}
body.dark .card, body.dark .search-bar{background:#1e1e1e;color:#eee}
body.dark .cat-btn{background:#333;color:#ff6600;border-color:#ff6600} /* COLOR CHANGE */
nav{background:#ff6600;color:white;padding:15px;display:flex;justify-content:space-between;position:sticky;top:0;z-index:100;align-items:center;} /* COLOR CHANGE */
nav a{color:white;text-decoration:none;margin:0 10px;font-weight:bold} 
nav button{background:none; border:none; color:white; cursor:pointer; font-size:16px;}
.banner{background:linear-gradient(90deg,#ff6600,#cc4400);color:white;text-align:center;padding:15px;font-size:18px;font-weight:bold} /* COLOR CHANGE */
.search-bar{padding:15px;background:white;position:sticky;top:60px;z-index:99}
body.dark .search-bar{background:#1e1e1e;}
.search-bar input{width:95%;padding:10px;border-radius:20px;border:1px solid #ddd}
.categories{display:flex;gap:10px;padding:10px 0;overflow-x:auto}
.cat-btn{padding:8px 16px;border:2px solid #ff6600;border-radius:20px;background:white;color:#ff6600;cursor:pointer;white-space:nowrap} /* COLOR CHANGE */
.cat-btn.active{background:#ff6600;color:white} /* COLOR CHANGE */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;padding:20px;background:#f8f8f8} 
body.dark .grid{background:#121212}
.card{background:white;border-radius:10px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1);position:relative} 
.card img{width:100%;height:180px;object-fit:cover;border-radius:8px} 
.price{color:#ff6600;font-size:20px;font-weight:bold} /* COLOR CHANGE */
button{background:#ff6600;color:white;border:none;padding:10px 15px;border-radius:5px;cursor:pointer} /* COLOR CHANGE */
button:disabled{background:#ccc;cursor:not-allowed}
input{width:95%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:5px} 
.out-stock{position:absolute;top:10px;right:10px;background:red;color:white;padding:5px 10px;border-radius:5px;font-size:12px}
.reorder-btn{background:#28a745;margin-top:10px;width:100%}

/* SYSTEM MENU CSS */
#sysMenu{display:none; position:absolute; right:0; top:45px; background:white; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.2); min-width:220px; z-index:999; overflow:hidden;}
#sysMenu a{display:block; padding:12px 15px; color:#333; text-decoration:none; border-bottom:1px solid #eee;}
#sysMenu a:hover{background:#f5f5f5;}
body.dark #sysMenu{background:#2a2a2a;}
body.dark #sysMenu a{color:#eee; border-color:#444;}
body.dark #sysMenu a:hover{background:#333;}

@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style></head><body>

<nav>
    <div>
        <a href="/">🍴 Eat4Bite™ Home</a> 
        <a href="/track">📦 Track</a> 
    </div>
    <div style="display:flex; gap:15px; align-items:center; position:relative;">
        <button onclick="toggleDark()">🌙</button>
        <button onclick="showCart()" style="background:white;color:#ff6600;border-radius:20px;padding:8px 15px;font-weight:bold;">Cart (<span id="count">0</span>)</button> <!-- COLOR CHANGE -->
        
        <!-- 3 DOT BUTTON -->
        <button onclick="toggleSysMenu()" style="font-size:24px;">⋮</button>
        
        <!-- HIDDEN MENU -->
        <div id="sysMenu">
            <a href="/restaurant-login">🏪 Restaurant Login</a>
            <a href="/restaurant-register">+ Add New Restaurant</a>
            <a href="/rider">🚴 Rider Login</a>
            <a href="/rider-register">+ Rider Register</a>
            <a href="/admin" style="color:red; font-weight:bold;">👑 Admin Panel</a>
        </div>
    </div>
</nav>

<div class="banner">🔥 50% OFF on First Order - CODE: FIRST50 🔥</div>

<div class="container mt-3 mb-2">
  <a href="/restaurants" class="btn btn-warning w-100 fw-bold shadow-sm">🍽️ Switch Restaurant / More Restaurants</a>
</div>

<div class="search-bar">
    <input id="search" placeholder="🔍 Search Pizza, Burger..." onkeyup="filterItems()">
    <div class="categories" id="categories"></div>
</div>

<div class="grid" id="menu"><p style="text-align:center">Loading...</p></div>

<script>
const API = 'https://eat4bite-ymqk.onrender.com/api'; // <- SAHI HAI
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let allItems = []; 
let currentCat = 'All';
const urlParams = new URLSearchParams(window.location.search);
const shopId = urlParams.get('shop') || 'default-shop';

if(localStorage.getItem('dark')=='true') document.body.classList.add('dark');
function toggleDark(){
    document.body.classList.toggle('dark');
    localStorage.setItem('dark', document.body.classList.contains('dark'));
}

// SYSTEM MENU TOGGLE
function toggleSysMenu(){
    const menu = document.getElementById('sysMenu');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}
// Bahar click karne pe band
document.addEventListener('click', function(e){
    if(!e.target.closest('#sysMenu') && !e.target.closest('button[onclick="toggleSysMenu()"]')){
        document.getElementById('sysMenu').style.display = 'none';
    }
})

fetch(`${API}/menu?shop=${shopId}`).then(res=>res.json()).then(items=>{
    allItems = items;
    loadCategories();
    displayItems(items);
    checkReorder();
}).catch(()=>{document.getElementById('menu').innerHTML="<h3>Server Error</h3>"})

function loadCategories(){
    const cats = ['All', ...new Set(allItems.map(i=>i.category || 'Other'))];
    document.getElementById('categories').innerHTML = cats.map((c,idx)=>`<button class="cat-btn" onclick="setCat('${c}', this)">${c}</button>`).join('');
    document.querySelector('.cat-btn').classList.add('active');
}
function setCat(cat, btn){
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filterItems();
}
function filterItems(){
    const search = document.getElementById('search').value.toLowerCase();
    let filtered = allItems.filter(i=> currentCat=='All' || (i.category || 'Other')==currentCat);
    filtered = filtered.filter(i=> i.name.toLowerCase().includes(search) || (i.desc && i.desc.toLowerCase().includes(search)));
    displayItems(filtered);
}

function displayItems(items){
    if(items.length==0) document.getElementById('menu').innerHTML="<h3 style='text-align:center;width:100%;padding:50px'>No items found</h3>"
    else document.getElementById('menu').innerHTML = items.map(item=>{
        const price = item.offer? Math.round(item.price*(1-item.offer/100)) : item.price;
        return `
        <div class="card">
            ${item.inStock===false ? '<div class="out-stock">Out of Stock</div>' : ''}
            <img src="${item.image || item.img}" onerror="this.src='https://via.placeholder.com/300x200/ff6600/ffffff?text=Eat4Bite'"> <!-- COLOR CHANGE -->
            <h3>${item.name} ${item.offer?`<span style="color:red;background:#ffe0e0;padding:2px 6px;border-radius:4px">-${item.offer}%</span>`:''}</h3>
            <p style="color:#666">${item.desc}</p>
            <p style="font-size:12px;color:#888">${item.category || 'Other'}</p>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
                <span class="price">₹${price}</span>
                <button onclick='addToCart(${JSON.stringify(item)})' ${item.inStock===false?'disabled':''}>${item.inStock===false?'Sold Out':'Add +'}</button>
            </div>
        </div>`
    }).join('')
}

function addToCart(item){ 
    if(item.inStock===false) return alert("Ye item stock me nahi hai");
    const price = item.offer? Math.round(item.price*(1-item.offer/100)) : item.price; 
    const ex = cart.find(i=>i._id==item._id); 
    if(ex) ex.qty++; 
    else cart.push({...item, price, qty:1}); 
    localStorage.setItem('cart', JSON.stringify(cart)); 
    updateCart(); 
    alert(item.name + " added to cart!") 
}
function updateCart(){ 
    document.getElementById('count').innerText = cart.reduce((s,i)=>s+i.qty,0); 
}
function showCart(){
    if(cart.length==0) return alert("Cart khali hai");
    window.location = '/cart';
} 
function checkReorder(){
    const lastOrder = JSON.parse(localStorage.getItem('lastOrder') || '[]');
    if(lastOrder.length>0){
        const banner = document.createElement('div');
        banner.innerHTML = `<button class="reorder-btn" onclick="reorder()">🔄 Order Again: ${lastOrder.map(i=>i.name).join(', ')}</button>`;
        document.querySelector('.search-bar').appendChild(banner);
    }
}
function reorder(){
    const lastOrder = JSON.parse(localStorage.getItem('lastOrder') || '[]');
    if(lastOrder.length==0) return alert('No previous order');
    cart = [...lastOrder];
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCart();
    alert("✅ Previous order added to cart!");
    window.location = '/cart';
}
updateCart();
</script></body></html>
