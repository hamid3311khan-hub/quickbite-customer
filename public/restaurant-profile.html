<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Profile - QuickBite</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{background:#f8f9fa}
    .navbar-brand{color:#ff5722!important; font-weight:bold}
    .card{border-radius:15px}
</style>
</head>
<body>

<nav class="navbar bg-white shadow-sm px-3">
    <a href="/restaurant-dashboard" class="navbar-brand">🍔 <span id="resName"></span></a>
    <div>
        <a href="/restaurant-dashboard" class="btn btn-outline-secondary btn-sm me-2">← Dashboard</a>
        <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow-sm p-4">
                <h4 class="mb-4">⚙️ Restaurant Profile</h4>
                <div id="profileData">Loading...</div>
                <hr>
                <h5>Payment Details</h5>
                <table class="table table-sm">
                    <tr><td>Registration Fee</td><td>₹2000 One Time</td></tr>
                    <tr><td>Yearly Maintenance</td><td>₹200 / Year</td></tr>
                    <tr><td>Last Payment</td><td id="lastPayment">-</td></tr>
                    <tr><td>Next Due Date</td><td id="nextDue">-</td></tr>
                    <tr><td>Status</td><td><span class="badge bg-success" id="payStatus">Paid</span></td></tr>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
const owner = JSON.parse(localStorage.getItem('restaurantOwner'));
if(!owner){ window.location.href = '/restaurant-login'; }

document.getElementById('resName').innerText = owner.restaurantName;

let html = `
    <p><b>Owner Name:</b> ${owner.ownerName}</p>
    <p><b>Restaurant Name:</b> ${owner.restaurantName}</p>
    <p><b>Email:</b> ${owner.email}</p>
    <p><b>Mobile:</b> ${owner.mobile}</p>
    <p><b>Address:</b> ${owner.address}</p>
    <p><b>Restaurant ID:</b> ${owner.restaurantId}</p>
    <p><b>Account Status:</b> <span class="badge ${owner.status=='Approved'?'bg-success':'bg-warning'}">${owner.status}</span></p>
`;
document.getElementById('profileData').innerHTML = html;

document.getElementById('lastPayment').innerText = new Date(owner.lastPaymentDate).toLocaleDateString('hi-IN');
document.getElementById('nextDue').innerText = new Date(owner.nextDueDate).toLocaleDateString('hi-IN');

function logout(){
    localStorage.removeItem('restaurantOwner');
    window.location.href = '/restaurant-login';
}
</script>
</body>
</html>
