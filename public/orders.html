<!DOCTYPE html>
<html>
<head>
  <title>All Orders - QuickBite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .order { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .status { background: #4CAF50; color: white; padding: 4px 10px; border-radius: 5px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>📦 All Orders</h1>
  <div id="orders">Loading...</div>

  <script>
    const API_URL = '/api/orders';
    const div = document.getElementById('orders');
    
    fetch(API_URL)
    .then(res => {
      console.log("Status:", res.status);
      if(!res.ok) throw new Error('Server Error: ' + res.status);
      return res.json();
    })
    .then(orders => {
      console.log("Orders:", orders);
      if(orders.length === 0){
        div.innerHTML = "<p>Koi order nahi hai abhi. Pehle website se order karo 😄</p>";
        return;
      }
      div.innerHTML = orders.map(o => `
        <div class="order">
          <h3>Order #${o._id.slice(-6)} <span class="status">${o.status}</span></h3>
          <p><b>Total:</b> ₹${o.total}</p>
          <small>${new Date(o.createdAt).toLocaleString('en-IN')}</small>
        </div>
      `).join('');
    })
    .catch(err => {
      div.innerHTML = `<p style="color:red; font-weight:bold;">Error: ${err.message}</p>`;
    });
  </script>
</body>
</html>
