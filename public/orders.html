<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickBite Admin Panel</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;padding:20px}
.container{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:8px}
.login-box{max-width:400px;margin:100px auto;text-align:center}
input,button{padding:10px;margin:5px;width:90%;border:1px solid #ddd;border-radius:5px}
button{background:#ff6600;color:white;border:none;cursor:pointer}
.order-card{border:1px solid #ddd;padding:15px;margin:10px 0;border-radius:5px}
.status{font-weight:bold}
.Pending{color:orange} .Preparing{color:blue} .Delivered{color:green}
</style>
</head>
<body>

<div class="login-box" id="loginBox">
    <h2>Admin Login</h2>
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error" style="color:red"></p>
</div>

<div class="container" id="adminPanel" style="display:none">
    <h1>📦 QuickBite Orders</h1>
    <button onclick="loadOrders()">Refresh</button>
    <div id="orders"></div>
</div>

<script>
const API_URL = 'https://mqk.onrender.com/api'; // YE LINE IMPORTANT HAI

function login(){
    const pass = document.getElementById('password').value;
    fetch(`${API_URL}/admin/login`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({password:pass})
    }).then(res=>res.json()).then(data=>{
        if(data.success){
            document.getElementById('loginBox').style.display='none';
            document.getElementById('adminPanel').style.display='block';
            loadOrders();
        }else{
            document.getElementById('error').innerText='Wrong Password';
        }
    })
}

function loadOrders(){
    fetch(`${API_URL}/orders`).then(res=>res.json()).then(orders=>{
        let html='';
        orders.forEach(o=>{
            html+=`<div class="order-card">
                <h3>Order #${o._id.slice(-6)}</h3>
                <p><b>Name:</b> ${o.name}</p>
                <p><b>Phone:</b> ${o.phone}</p>
                <p><b>Address:</b> ${o.address}</p>
                <p><b>Total:</b> ₹${o.total}</p>
                <p class="status ${o.status}"><b>Status:</b> ${o.status}</p>
                <select onchange="updateStatus('${o._id}',this.value)">
                    <option ${o.status=='Pending'?'selected':''}>Pending</option>
                    <option ${o.status=='Preparing'?'selected':''}>Preparing</option>
                    <option ${o.status=='Delivered'?'selected':''}>Delivered</option>
                </select>
                <button onclick="deleteOrder('${o._id}')" style="background:red">Delete</button>
            </div>`
        })
        document.getElementById('orders').innerHTML=html;
    })
}

function updateStatus(id,status){
    fetch(`${API_URL}/orders/${id}/status`,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({status})
    }).then(()=>loadOrders())
}

function deleteOrder(id){
    if(confirm('Delete this order?')){
        fetch(`${API_URL}/orders/${id}`,{method:'DELETE'}).then(()=>loadOrders())
    }
}
</script>
</body>
</html>
