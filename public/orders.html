<!DOCTYPE html>
<html>
<head>
  <title>All Orders - QuickBite Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
   .order { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; }
   .status { background: #ff6b00; color: white; padding: 4px 10px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>📦 All Orders - Admin</h1>
  <div id="orders">Loading...</div>
  <script>
    fetch('/api/orders').then(res => res.json()).then(orders => {
      const div = document.getElementById('orders');
      if(orders.length === 0) div.innerHTML = "<p>Koi order nahi hai</p>";
      else {
        div.innerHTML = orders.map(o => `
          <div class="order">
            <h3>Order #${o._id.slice(-6)} <span class="status">${o.status}</span></h3>
            <p><b>Total:</b> ₹${o.total}</p>
            <small>${new Date(o.createdAt).toLocaleString('en-IN')}</small>
          </div>
        `).join('');
      }
    }).catch(err => div.innerHTML = "<p style='color:red;'>API Error</p>");
  </script>
</body>
</html>
