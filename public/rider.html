<!DOCTYPE html><html><head><title>Rider Panel - QuickBite</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>body{font-family:Arial;background:#f1f1f1;padding:20px}.box{max-width:500px;margin:auto;background:white;padding:20px;border-radius:10px}input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ccc;font-size:16px}button{background:#ff5722;color:white;border:none;cursor:pointer;font-weight:bold}.green{background:#28a745}.orderCard{border:1px solid #ddd;padding:10px;margin:10px 0;border-radius:8px}</style></head><body><div class="box" id="loginBox"><h2>🚚 Rider Login</h2><input id="riderId" placeholder="Rider ID: RIDER1"><input id="riderName" placeholder="Name"><input id="riderPhone" placeholder="Phone"><button onclick="login()">Duty Start</button></div><div class="box" id="dashBox" style="display:none"><h2>Welcome <span id="rName"></span></h2><button class="green" onclick="sendLocation()">📍 Location Bhejo</button><p id="locStatus">Status: Offline</p><h3>Mere Order</h3><div id="myOrders">Loading...</div><button onclick="logout()" style="background:#dc3545">Duty Off</button></div><script src="/socket.io/socket.io.js"></script><script>const API = 'https://quickbite-ymqk.onrender.com/api'; const socket = io(API); let riderId = localStorage.getItem('riderId'); if(riderId) showDash(); async function login(){ riderId = document.getElementById('riderId').value; const name = document.getElementById('riderName').value; const phone = document.getElementById('riderPhone').value; await fetch(`${API}/rider/login`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({riderId,name,phone})}); localStorage.setItem('riderId', riderId); showDash(); } function showDash(){ document.getElementById('loginBox').style.display='none'; document.getElementById('dashBox').style.display='block'; document.getElementById('rName').innerText = riderId; loadOrders(); } async function sendLocation(){ navigator.geolocation.getCurrentPosition(pos=>{ const data = {riderId, lat: pos.coords.latitude, lng: pos.coords.longitude}; socket.emit('riderLocation', data); document.getElementById('locStatus').innerText = "Status: Sent ✅"; }); } async function loadOrders(){ const res = await fetch(`${API}/rider/orders/${riderId}`); const orders = await res.json(); document.getElementById('myOrders').innerHTML = orders.map(o=>`<div class="orderCard"><b>${o.trackId}</b><br>${o.name} - ${o.address}<br>₹${o.total}</div>`).join('') || "Koi order nahi"; } function logout(){ localStorage.removeItem('riderId'); location.reload(); } setInterval(loadOrders, 15000);</script></body></html>
