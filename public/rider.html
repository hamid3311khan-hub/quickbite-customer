<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"><title>Rider Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial; background:#f4f4f4; margin:0; padding:20px;}
.login-box, .dashboard{background:white; padding:20px; border-radius:12px; max-width:500px; margin:auto; box-shadow:0 2px 10px #ccc;}
h2{text-align:center; color:#ff5722;}
input{width:100%; padding:12px; margin:8px 0; border-radius:6px; border:1px solid #ccc; box-sizing:border-box;}
button{width:100%; padding:14px; background:#ff5722; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;}
.order{border:1px solid #ddd; padding:15px; margin:10px 0; border-radius:8px;}
.top-bar{display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;}
.logout-btn{background:#dc3545; width:auto; padding:8px 15px;}
</style>
</head>
<body>

<div class="login-box" id="loginBox">
  <h2>🏍️ Rider Login</h2>
  <input id="riderMobile" placeholder="Registered Mobile Number" maxlength="10">
  <button onclick="riderLogin()">Login Karo</button>
</div>

<div class="dashboard" id="dashboard" style="display:none;">
  <div class="top-bar">
    <h2 id="riderName">Rider Panel</h2>
    <button class="logout-btn" onclick="riderLogout()">🚪 Logout</button>
  </div>
  
  <p><b>Status:</b> <span id="riderStatus">Offline</span></p>
  <button onclick="goOnline()">🟢 Online Ho Jao</button>
  <button onclick="goOffline()" style="background:#6c757d;">🔴 Offline Ho Jao</button>
  
  <h3 style="margin-top:20px;">📦 Mere Orders</h3>
  <div id="myOrders">Loading...</div>
</div>

<script>
const API = '';
let riderData = null;

window.onload = () => {
    riderData = JSON.parse(localStorage.getItem('riderData'));
    if(riderData){
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('riderName').innerText = `Hello, ${riderData.name}`;
        document.getElementById('riderStatus').innerText = riderData.status;
        loadMyOrders();
    }
}

async function riderLogin(){
    const mobile = document.getElementById('riderMobile').value;
    if(!mobile) return alert('Mobile daalo');
    const res = await fetch(API+'/api/rider/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mobile})});
    const data = await res.json();
    if(data.success){
        riderData = data.rider;
        localStorage.setItem('riderData', JSON.stringify(riderData));
        location.reload();
    } else alert(data.msg);
}

function riderLogout(){
    localStorage.removeItem('riderData');
    location.reload();
}

async function goOnline(){
    await fetch(API+`/api/rider/${riderData._id}/status`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'Online'})});
    riderData.status = 'Online';
    localStorage.setItem('riderData', JSON.stringify(riderData));
    document.getElementById('riderStatus').innerText = 'Online';
}

async function goOffline(){
    await fetch(API+`/api/rider/${riderData._id}/status`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'Approved'})});
    riderData.status = 'Approved';
    localStorage.setItem('riderData', JSON.stringify(riderData));
    document.getElementById('riderStatus').innerText = 'Approved';
}

async function loadMyOrders(){
    const res = await fetch(API+`/api/rider/orders/${riderData.mobile}`);
    const orders = await res.json();
    document.getElementById('myOrders').innerHTML = orders.length === 0 ? 'Koi order nahi hai' :
    orders.map(o => `<div class="order"><b>${o.trackId}</b> - ₹${o.total} <br><small>${o.name} | ${o.phone}</small> <br><small>${o.address}</small> <br><b>Status:</b> ${o.status} <br><button onclick="markDelivered('${o._id}')">Delivered Mark Karo</button></div>`).join('');
}

async function markDelivered(orderId){
    await fetch(API+'/api/order/delivered', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({orderId})});
    alert('Order Delivered!');
    loadMyOrders();
}
</script>
</body>
</html>
