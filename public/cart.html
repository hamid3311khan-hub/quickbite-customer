<!DOCTYPE html>
<html>
<head>
  <title>Your Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .item { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; }
    button { background: #ff6b00; color: white; border: none; padding: 15px; border-radius: 5px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🛒 Your Cart</h1>
  <div id="cart-items"></div>
  <h2>Total: ₹<span id="total">0</span></h2>
  
  <button onclick="placeOrder()">Pay Now & Place Order</button> 

  <script src="payment.js"></script>
  <script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    document.getElementById('cart-items').innerHTML = cart.map(i=>`<div class="item">${i.name} - ₹${i.price}</div>`).join('');
    document.getElementById('total').innerText = cart.reduce((s,i)=>s+i.price,0);
  </script>
</body>
</html>
