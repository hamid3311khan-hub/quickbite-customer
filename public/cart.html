<!DOCTYPE html><html><head><title>Cart - QuickBite</title><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;font-family:Arial}
nav{background:#ff6600;color:white;padding:15px}
.container{max-width:600px;margin:20px auto;padding:20px}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
input{width:95%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:5px}
button{background:#28a745;color:white;border:none;padding:15px;width:100%;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px}
.coupon-box{display:flex;gap:10px;margin:15px 0}
.coupon-box input{margin:0}
.total{font-size:20px;font-weight:bold;color:#ff6600;margin:10px 0}
.payment-option{border:2px solid #ddd;padding:12px;border-radius:8px;margin:10px 0;cursor:pointer}
.payment-option.active{border-color:#ff6600;background:#fff5f0}
#qrBox{text-align:center;display:none;padding:15px;border:1px dashed #ff6600;border-radius:8px;margin:10px 0}
.cart-item{display:flex;justify-content:space-between;align-items:center;margin:10px 0}
.remove-btn{width:auto;padding:5px 10px;background:red;font-size:12px}
</style></head><body>
<nav><a href="/index" style="color:white;text-decoration:none">← Back to Menu</a></nav>

<div class="container">
    <div class="card">
        <h2>🛒 Your Cart</h2>
        <div id="cartItems"></div>
        <hr>
        
        <div class="coupon-box">
            <input id="coupon" placeholder="Enter Coupon: FIRST30">
            <button onclick="applyCoupon()" style="width:auto;background:#ff6600">Apply</button>
        </div>
        <p id="discountMsg" style="color:green"></p>

        <p class="total">Total: ₹<span id="total">0</span></p>
        
        <h3>Payment Method</h3>
        <div class="payment-option active" onclick="selectPay('COD', this)">
            <b>💵 Cash on Delivery</b><br><small>Order ke time cash dena</small>
        </div>
        <div class="payment-option" onclick="selectPay('UPI', this)">
            <b>📱 Pay Online - UPI</b><br><small>Scan karke pay karo</small>
        </div>
        
        <div id="qrBox">
            <p><b>Scan karke ₹<span id="qrAmount">0</span> pay kare</b></p>
            <img id="qr" src="" style="width:220px;margin:10px 0">
        </div>

        <h3>Delivery Details</h3>
        <input id="name" placeholder="Full Name">
        <input id="phone" placeholder="Phone">
        <input id="address" placeholder="Address">
        
        <button onclick="placeOrder()">Place Order</button>
    </div>
</div>

<script>
const API = 'https://quickbite-ymqk.onrender.com/api';
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let discount = 0;
let paymentMode = 'COD';
let finalTotal = 0;

function loadCart(){
    if(cart.length==0){document.getElementById('cartItems').innerHTML="<p>Cart is empty</p>"; document.getElementById('total').innerText=0; return;}
    let total = cart.reduce((s,i)=>s+i.price*i.qty,0);
    finalTotal = total - discount;
    document.getElementById('cartItems').innerHTML = cart.map((i,index)=>`
        <div class="cart-item">
            <span>${i.name} x${i.qty} - ₹${i.price*i.qty}</span>
            <button onclick="remove(${index})" class="remove-btn">X</button>
        </div>
    `).join('');
    document.getElementById('total').innerText = finalTotal;
    updateQR();
}

function remove(index){
    cart.splice(index,1);
    localStorage.setItem('cart', JSON.stringify(cart));
    loadCart();
}

function selectPay(mode, el){
    paymentMode = mode;
    document.querySelectorAll('.payment-option').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('qrBox').style.display = mode=='UPI' ? 'block' : 'none';
    updateQR();
}

function updateQR(){
    let upiID = "tanbalkhi2014-3@okhdfcbank"; // <-- Tera UPI ID
    if(finalTotal > 0){
        document.getElementById('qr').src = `https://upiqr.in/api/qr?name=QuickBite&vpa=${upiID}&amount=${finalTotal}`;
        document.getElementById('qrAmount').innerText = finalTotal;
    }
}

async function applyCoupon(){
    const code = document.getElementById('coupon').value;
    const res = await fetch(`${API}/coupon/validate`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code})});
    const data = await res.json();
    if(data.success){
        let total = cart.reduce((s,i)=>s+i.price*i.qty,0);
        discount = data.type=='PERCENT' ? Math.round(total*data.discount/100) : data.discount;
        document.getElementById('discountMsg').innerText = `✅ ${data.discount}${data.type=='PERCENT'?'%':'₹'} Off Applied`;
        loadCart();
    } else alert("Invalid Coupon");
}

async function placeOrder(){
    const order = {
        name:document.getElementById('name').value,
        phone:document.getElementById('phone').value,
        address:document.getElementById('address').value,
        items:cart,
        total:finalTotal,
        payment:paymentMode,
        coupon:document.getElementById('coupon').value,
        discount:discount
    }
    if(!order.name || !order.phone || !order.address) return alert("Please fill all details");
    
    const res = await fetch(`${API}/orders`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(order)});
    const data = await res.json();
    
    if(data.success){
        localStorage.setItem('lastOrder', JSON.stringify(cart));
        localStorage.removeItem('cart');
        alert(`✅ Order Placed! Order ID: ${data.trackId}\nPayment: ${paymentMode}`);
        window.location = '/track?id=' + data.trackId;
    }
}
loadCart();
</script></body></html>
