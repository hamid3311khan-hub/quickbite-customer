<!DOCTYPE html><html lang="hi"><head><title>Cart - Eat4Bite™</title><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;font-family:Arial;background:#f5f5f5}
nav{background:#ff4d4d;color:white;padding:15px;font-weight:bold}
.container{max-width:600px;margin:20px auto;padding:20px}
.card{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
input{width:95%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:5px}
button{background:#28a745;color:white;border:none;padding:15px;width:100%;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px}
button:disabled{background:#ccc;cursor:not-allowed}
.coupon-box{display:flex;gap:10px;margin:15px 0}
.coupon-box input{margin:0}
.coupon-box button{width:auto;padding:12px 20px;background:#ff4d4d;margin:0}
.total{font-size:22px;font-weight:bold;color:#ff4d4d;margin:10px 0}
.payment-option{border:2px solid #ddd;padding:12px;border-radius:8px;margin:10px 0;cursor:pointer;transition:0.2s}
.payment-option.active{border-color:#ff4d4d;background:#fff5f0}
#qrBox{text-align:center;display:none;padding:15px;border:1px dashed #ff4d4d;border-radius:8px;margin:10px 0;background:#fff}
.cart-item{display:flex;justify-content:space-between;align-items:center;margin:10px 0;padding:8px 0;border-bottom:1px solid #eee}
.remove-btn{width:auto;padding:5px 10px;background:red;font-size:12px;border-radius:5px}
.empty{text-align:center;color:#888;padding:20px}
</style></head><body>
<nav><a href="/restaurants" style="color:white;text-decoration:none">🍴 Eat4Bite™ ← Back to Menu</a></nav>

<div class="container">
    <div class="card">
        <h2>🛒 Your Cart</h2>
        <div id="cartItems"></div>
        <hr>

        <div class="coupon-box">
            <input id="coupon" placeholder="Enter Coupon: FIRST30">
            <button onclick="applyCoupon()">Apply</button>
        </div>
        <p id="discountMsg" style="color:green;font-weight:bold"></p>

        <div id="billBreakup"></div>

        <h3>Total: ₹<span id="total">0</span></h3>

        <h3>Payment Method</h3>
        <div class="payment-option active" onclick="selectPay('COD', this)">
            <b>💵 Cash on Delivery</b><br><small>Order ke time cash dena</small>
        </div>
        <div class="payment-option" onclick="selectPay('UPI', this)">
            <b>📱 Pay Online - UPI</b><br><small>Scan karke pay karo</small>
        </div>

        <div id="qrBox">
            <p><b>Scan karke ₹<span id="qrAmount">0</span> pay kare</b></p>
            <img id="qr" src="" style="width:220px;margin:10px 0">
            <p style="font-size:12px;color:#666">UPI ID: tanbalkhi2014-3@okhdfcbank</p>
        </div>

        <h3>Delivery Details</h3>
        <input id="name" placeholder="Full Name" required>
        <input id="phone" placeholder="Phone - 10 digit" maxlength="10" required>
        <input id="address" placeholder="Complete Address" required>

        <button id="placeBtn" onclick="placeOrder()">Place Order</button>
    </div>
</div>

<script>
const API = 'https://quickbite-ymqk.onrender.com/api'; // <- Yaha change karna hai
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let discount = 0;
let paymentMode = 'COD';
let finalTotal = 0;
let shopId = localStorage.getItem('shopId');

function loadCart(){
    if(cart.length==0){
        document.getElementById('cartItems').innerHTML="<p class='empty'>Cart is empty</p>";
        document.getElementById('total').innerText=0;
        finalTotal=0;
        document.getElementById('placeBtn').disabled = true;
        updateQR();
        return;
    }
    document.getElementById('placeBtn').disabled = false;
    let item_total = cart.reduce((s,i)=>s+i.price*i.qty,0);
    
    let commission_5 = Math.round(item_total * 0.05);
    let platform_fee = 10; let delivery_fee = 30;
    let subtotal = item_total - discount;
    finalTotal = subtotal + commission_5 + platform_fee + delivery_fee;
    if(finalTotal<0) finalTotal=0;

    document.getElementById('cartItems').innerHTML = cart.map((i,index)=>`
        <div class="cart-item">
            <span><b>${i.name}</b> x${i.qty} - ₹${i.price*i.qty}</span>
            <button onclick="remove(${index})" class="remove-btn">X</button>
        </div>
    `).join('');

    document.getElementById('billBreakup').innerHTML = `
        <p>Subtotal: ₹${item_total}</p>
        ${discount > 0 ? `<p style="color:green">Discount: -₹${discount}</p>` : ''}
        <p>Platform Fee: ₹${platform_fee}</p>
        <p>Delivery Fee: ₹${delivery_fee}</p>
        <p>Service 5%: ₹${commission_5}</p>
        <hr>
    `;
    document.getElementById('total').innerText = finalTotal;
    updateQR();
}

function remove(index){
    cart.splice(index,1);
    localStorage.setItem('cart', JSON.stringify(cart));
    loadCart();
}

function selectPay(mode, el){
    paymentMode = mode;
    document.querySelectorAll('.payment-option').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('qrBox').style.display = mode=='UPI'? 'block' : 'none';
    updateQR();
}

function updateQR(){
    let upiID = "tanbalkhi2014-3@okhdfcbank";
    if(paymentMode=='UPI' && finalTotal > 0){
        document.getElementById('qr').src = `https://upiqr.in/api/qr?name=Eat4Bite&vpa=${upiID}&amount=${finalTotal}`; // <- Yaha change
        document.getElementById('qrAmount').innerText = finalTotal;
    } else {
        document.getElementById('qr').src = "";
        document.getElementById('qrAmount').innerText = 0;
    }
}

async function applyCoupon(){
    const code = document.getElementById('coupon').value.trim();
    if(!code) return alert("Coupon code dalo");
    const res = await fetch(`${API}/coupon/validate`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code})});
    const data = await res.json();
    if(data.success){
        let item_total = cart.reduce((s,i)=>s+i.price*i.qty,0);
        discount = data.type=='PERCENT'? Math.round(item_total*data.discount/100) : data.discount;
        document.getElementById('discountMsg').innerText = `✅ ${data.discount}${data.type=='PERCENT'?'%':'₹'} Off Applied`;
        loadCart();
    } else {
        discount = 0;
        document.getElementById('discountMsg').innerText = "";
        alert("Invalid Coupon");
        loadCart();
    }
}

async function placeOrder(){
    document.getElementById('placeBtn').innerText = "📍 Location le rahe hain...";
    document.getElementById('placeBtn').disabled = true;

    if(!shopId) return alert("Error: Restaurant select nahi hai. Pehle restaurant choose karo");

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const order = {
            name:document.getElementById('name').value.trim(),
            phone:document.getElementById('phone').value.trim(),
            address:document.getElementById('address').value.trim(),
            items:cart,
            restaurantId: shopId,
            payment:paymentMode,
            coupon:document.getElementById('coupon').value,
            discount:discount,
            custLat: pos.coords.latitude,
            custLng: pos.coords.longitude
        }
        if(!order.name ||!order.phone ||!order.address) return alert("Please fill all details");
        if(order.phone.length!= 10) return alert("Valid 10 digit phone number dalo");

        const res = await fetch(`${API}/orders`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(order)});
        const data = await res.json();

        if(data.success){
            localStorage.setItem('lastOrder', JSON.stringify(cart));
            localStorage.removeItem('cart');
            window.location = '/track?id=' + data.trackId;
        } else {
            alert("Order failed: " + data.message);
            document.getElementById('placeBtn').innerText = "Place Order";
            document.getElementById('placeBtn').disabled = false;
        }
    }, (err)=>{
        alert("Location allow karo bhai. Bina location order nahi hoga");
        document.getElementById('placeBtn').innerText = "Place Order";
        document.getElementById('placeBtn').disabled = false;
    });
}
loadCart();
</script></body></html>
