<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickBite Admin</title>
<style>
    body{font-family:Arial; background:#f4f4f4; padding:20px;}
 .card{background:white; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 5px #ccc;}
    input, select, button, textarea{padding:10px; margin:5px; border-radius:5px; border:1px solid #ccc; width:calc(100% - 22px);}
    button{background:#ff5722; color:white; border:none; cursor:pointer;}
    button:hover{opacity:0.9;}
 .grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:15px;}
 .stat-card{background:#ff5722; color:white; text-align:center; padding:20px;}
 .stat-card h2{margin:0; font-size:30px;}
 .order,.menu-item,.rider-item{border:1px solid #ddd; padding:10px; margin:10px 0; border-radius:5px;}
 .btn-green{background:#25D366;}.btn-red{background:#dc3545;}.btn-blue{background:#007bff;}.btn-orange{background:orange;}
 .report-result p{margin:5px 0; font-size:16px;}
 .logout-btn{background:#6c757d; float:right; padding:8px 15px; width:auto;}
    small{color:#666; font-size:12px;}
 .rider-docs img{width:70px; height:70px; object-fit:cover; border:1px solid #ccc; border-radius:5px; margin:3px;}
</style>
</head>
<body>

<button class="logout-btn" onclick="logout()">🚪 Logout</button>
<h1>🔥 QuickBite Admin Panel</h1>

<div class="grid">
    <div class="card stat-card"><h3>Total Orders</h3><h2 id="totalOrders">0</h2></div>
    <div class="card stat-card" style="background:#007bff;"><h3>Total Customers</h3><h2 id="totalCustomers">0</h2></div>
</div>

<div class="card">
    <h2>🏍️ Pending Rider Approvals</h2>
    <div id="pendingRidersList">Loading...</div>
</div>

<div class="card">
    <h2>📊 Sales Report</h2>
    <div style="display:flex; gap:10px;">
        <input type="date" id="startDate">
        <input type="date" id="endDate">
    </div>
    <button class="btn-blue" onclick="getReport()">Get Report</button>
    <div id="reportResult" class="report-result"></div>
</div>

<div class="card">
    <h2>📢 WhatsApp Broadcast</h2>
    <textarea id="broadcastMsg" placeholder="Offer: 50% OFF on First Order" rows="3"></textarea>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn-green" onclick="sendBroadcast('all')">Send to All Customers</button>
        <button class="btn-blue" onclick="sendBroadcast('new')">Send to New Customers</button>
    </div>
    <div style="margin-top:15px; padding-top:15px; border-top:1px dashed #ddd;">
        <h4>Send to Selected Numbers</h4>
        <input type="text" id="manualNumbers" placeholder="7061840674, 8507317931, 9876543210">
        <small>Comma se alag karo. 91 lagane ki zarurat nahi</small>
        <button class="btn-green" onclick="sendBroadcast('manual')">Send to Selected</button>
    </div>
</div>

<div class="card">
    <h2>🎟️ Add Coupon</h2>
    <input type="text" id="couponCode" placeholder="Code: FIRST50">
    <input type="number" id="couponDiscount" placeholder="Discount: 50">
    <select id="couponType"><option value="FLAT">FLAT</option><option value="PERCENT">PERCENT</option></select>
    <button onclick="addCoupon()">Add Coupon</button>
</div>

<div class="card">
    <h2>🍔 Add New Menu Item</h2>
    <input type="text" id="itemName" placeholder="Item Name">
    <input type="number" id="itemPrice" placeholder="Price">
    <input type="text" id="itemDesc" placeholder="Description">
    <input type="text" id="itemCategory" placeholder="Category: Pizza, Burger">
    <input type="number" id="itemOffer" placeholder="Offer %">
    <input type="file" id="itemImg">
    <button onclick="addItem()">Add Item</button>
    <div id="menuList"></div>
</div>

<div class="card">
    <h2>📦 Orders</h2>
    <div id="ordersList">Loading...</div>
</div>

<script>
const API = '';
let riders = [];
let allRiders = [];

const ADMIN_PASSWORD = 'admin123';

function checkLogin(){
    if(sessionStorage.getItem('adminLoggedIn')!== 'true'){
        let pass = prompt("🔒 Admin Login\nPassword daalo:");
        if(pass === ADMIN_PASSWORD){ sessionStorage.setItem('adminLoggedIn', 'true'); }
        else { alert("Galat Password!"); window.location = '/'; }
    }
}
function logout(){ sessionStorage.removeItem('adminLoggedIn'); alert("Logout ho gaye"); window.location = '/'; }
checkLogin();

async function loadRiders(){
    const res = await fetch(API+'/api/riders/approved');
    const ridersData = await res.json();
    const freeRiders = [];
    for(let r of ridersData){
        const check = await fetch(API+`/api/rider/check-busy/${r.mobile}`);
        const data = await check.json();
        if(data.free) freeRiders.push(r);
    }
    riders = freeRiders;
}

async function loadData(){
    const allRiderRes = await fetch(API+'/api/riders'); allRiders = await allRiderRes.json();
    await loadRiders();

    const pending = allRiders.filter(r => r.status && r.status.toLowerCase() === 'pending');
    document.getElementById('pendingRidersList').innerHTML = pending.length === 0? 'Koi pending rider nahi hai' :
    pending.map(r => `
        <div class="rider-item">
            <b>${r.name}</b> - ${r.mobile} <br>
            <small>Father: ${r.fatherName} | Aadhar: ${r.aadhar} | PAN: ${r.pan}</small> <br>
            <div class="rider-docs">
                <b>Docs:</b><br>
                <img src="${r.aadharImg || 'https://via.placeholder.com/70'}" title="Aadhar">
                <img src="${r.panImg || 'https://via.placeholder.com/70'}" title="PAN">
                <img src="${r.photoImg || 'https://via.placeholder.com/70'}" title="Photo">
            </div>
            <button class="btn-green" onclick="approveRider('${r._id}')">✅ Approve Karo</button>
            <button class="btn-red" onclick="rejectRider('${r._id}')">❌ Reject</button>
            <button class="btn-orange" onclick="bulkDeleteRider('${r.mobile}')">🗑️ Is Mobile ke Sab Delete</button>
        </div>
    `).join('');

    const stats = await fetch(API+'/api/stats').then(r=>r.json());
    document.getElementById('totalOrders').innerText = stats.orders;
    document.getElementById('totalCustomers').innerText = stats.customers;

    const menu = await fetch(API+'/api/menu').then(r=>r.json());
    document.getElementById('menuList').innerHTML = menu.map(i=>`
        <div class="menu-item">
            <b>${i.name}</b> - ₹${i.price} - ${i.inStock? 'In Stock' : 'Out of Stock'}
            <button onclick="toggleStock('${i._id}')">${i.inStock? 'OFF' : 'ON'}</button>
            <button class="btn-red" onclick="delItem('${i._id}')">Delete</button>
        </div>
    `).join('');

    const orders = await fetch(API+'/api/orders').then(r=>r.json());
    document.getElementById('ordersList').innerHTML = orders.map(o=>`
        <div class="order">
            <b>${o.trackId}</b> - ${o.name} - ₹${o.total} <br>
            <b>Payment:</b> ${o.payment} | <b>Status:</b> ${o.status} | <b>Points:</b> ${o.pointsEarned || 0} <br>
            <small>${o.phone} | ${o.address}</small> <br>
            <select id="rider-${o._id}" style="margin-top:8px;">
                <option value="">-- Rider Select Karo --</option>
                ${riders.map(r => `<option value="${r.mobile}" ${o.riderId==r.mobile?'selected':''}>${r.name} - ${r.mobile}</option>`).join('')}
            </select>
            <button class="btn-green" onclick="assignRider('${o._id}')">Rider Assign</button>
            
            <!-- NAYA INVOICE BUTTON -->
            <a href="/invoice?id=${o.trackId}" target="_blank" 
               style="display:inline-block; background:#ff5722; color:white; padding:8px 12px; 
                      border-radius:5px; text-decoration:none; font-size:13px; margin:5px 0;">
               📄 Invoice
            </a>

            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="text" id="lat-${o._id}" placeholder="Rider Lat" value="${o.riderLat || ''}" style="width:45%">
                <input type="text" id="lng-${o._id}" placeholder="Rider Lng" value="${o.riderLng || ''}" style="width:45%">
            </div>
            <select onchange="updateStatus('${o._id}', this.value)">
                <option ${o.status=='Pending'?'selected':''}>Pending</option>
                <option ${o.status=='Preparing'?'selected':''}>Preparing</option>
                <option ${o.status=='Out for Delivery'?'selected':''}>Out for Delivery</option>
                <option ${o.status=='Delivered'?'selected':''}>Delivered</option>
            </select>
            <button class="btn-blue" onclick="updateLocation('${o._id}')">📍 Location Save</button>
            <a href="/track?id=${o.trackId}" target="_blank"><button class="btn-blue">Track</button></a>
            <button class="btn-red" onclick="delOrder('${o._id}')">Delete</button>
        </div>
    `).join('');
}

async function approveRider(id){ await fetch(API+`/api/rider/${id}/approve`, {method:'PUT'}); alert('Rider Approved!'); loadData(); }
async function rejectRider(id){ if(confirm('Pakka Reject karna hai?')){ await fetch(API+`/api/riders/${id}`, {method:'DELETE'}); alert('Rider Reject kiya'); loadData(); } }
async function bulkDeleteRider(mobile){ if(!confirm(`${mobile} number wale saare rider delete kar du?`)) return; await fetch(API+`/api/riders/bulk-delete`,{method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mobile})}); alert('Saare duplicate delete ho gaye'); loadData(); }

async function getReport(){ let s = document.getElementById('startDate').value; let e = document.getElementById('endDate').value; if(!s ||!e) return alert('Start aur End date select karo'); const d = await fetch(`${API}/api/report?start=${s}&end=${e}`).then(r=>r.json()); document.getElementById('reportResult').innerHTML = `<p><b>Total Revenue:</b> ₹${d.totalRevenue}</p><p><b>Total Orders:</b> ${d.totalOrders}</p>` }

async function sendBroadcast(type){
    const message = document.getElementById('broadcastMsg').value;
    if(!message) return alert('Message likho');
    let body = {message, type};
    if(type === 'manual'){ const numbers = document.getElementById('manualNumbers').value; if(!numbers) return alert('Number bhi daalo'); body.numbers = numbers; }
    const res = await fetch(API+'/api/broadcast', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    const data = await res.json(); alert(`${data.count} logo ko link ban gaye`); if(data.links) data.links.forEach(link => window.open(link, '_blank'));
}

async function addCoupon(){ const body = {code:couponCode.value, discount:+couponDiscount.value, type:couponType.value}; await fetch(API+'/api/coupon', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)}); alert('Coupon Added'); couponCode.value=''; }
async function addItem(){ const fd = new FormData(); fd.append('name', itemName.value); fd.append('price', itemPrice.value); fd.append('desc', itemDesc.value); fd.append('category', itemCategory.value); fd.append('offer', itemOffer.value); fd.append('img', itemImg.files[0]); await fetch(API+'/api/menu', {method:'POST', body:fd}); alert('Item Added'); loadData(); }
async function toggleStock(id){ await fetch(API+`/api/menu/${id}/stock`, {method:'PUT'}); loadData(); }
async function delItem(id){ if(confirm('Delete?')){ await fetch(API+`/api/menu/${id}`, {method:'DELETE'}); loadData(); }}

async function updateLocation(id){ const riderLat = document.getElementById(`lat-${id}`).value; const riderLng = document.getElementById(`lng-${id}`).value; await fetch(API+`/api/orders/${id}/status`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status: 'Out for Delivery', riderLat, riderLng})}); alert('📍 Location Save ho gayi'); loadData(); }

async function updateStatus(id, status){ const riderLat = document.getElementById(`lat-${id}`).value; const riderLng = document.getElementById(`lng-${id}`).value; const res = await fetch(API+`/api/orders/${id}/status`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status, riderLat, riderLng})}); const data = await res.json(); if(data.customerWaLink) window.open(data.customerWaLink, '_blank'); alert("Status Updated: " + status); loadData(); }

async function delOrder(id){ if(confirm('Pakka Delete karna hai?')){ await fetch(API+`/api/orders/${id}`, {method:'DELETE'}); alert("Order Delete ho gaya"); loadData(); } }

async function assignRider(orderId){
    const riderMobile = document.getElementById(`rider-${orderId}`).value;
    if(!riderMobile) return alert('Pehle Rider select karo');
    const res = await fetch(API+`/api/order/assign`, {
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({orderId, riderId: riderMobile})
    });
    const data = await res.json();
    if(data.success){
        alert('Rider Assign ho gaya!');
    } else {
        alert('❌ ' + data.msg);
    }
    loadData();
}

loadData();
</script>
</body>
</html>
