<!DOCTYPE html>
<html>
<head><title>Admin Panel</title></head>
<body>
<h1>Admin - Add Product</h1>
<input id="name" placeholder="Product Name"><br>
<input id="price" placeholder="Price" type="number"><br>
<button onclick="addProduct()">Add</button>
<h2>All Products</h2>
<div id="list"></div>

<script>
async function load(){
  const res = await fetch('/api/products');
  const data = await res.json();
  document.getElementById('list').innerHTML = data.map(p=>`<p>${p.name} - ₹${p.price}</p>`).join('');
}
async function addProduct(){
  await fetch('/api/products', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name: name.value, price: price.value})});
  load();
}
load();
</script>
</body>
</html>
