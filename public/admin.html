<!DOCTYPE html><html><head><title>Admin</title>
<style>body{font-family:Arial;padding:20px;background:#f4f4f4} .login,.panel{max-width:1000px;margin:auto;background:white;padding:20px;border-radius:8px}
input,button{padding:10px;margin:5px} button{background:#ff6600;color:white;border:none;cursor:pointer}
.order{border:1px solid #ddd;padding:15px;margin:10px 0}</style>
</head><body>

<div class="login" id="login">
<h2>Admin Login</h2><input type="password" id="pass" placeholder="Password: admin123">
<button onclick="login()">Login</button></div>

<div class="panel" id="panel" style="display:none">
<h2>Manage Menu</h2>
<form id="f"><input name="name" placeholder="Item Name" required><input name="price" type="number" placeholder="Price" required>
<input name="desc" placeholder="Description"><input name="offer" type="number" placeholder="Offer %">
<input name="img" type="file"><button>Add/Update Item</button></form>
<div id="menu"></div><hr><h2>All Orders</h2><div id="orders"></div>
</div>

<script>
const API = 'https://quickbite-ymqk.onrender.com/api';
function login(){
    fetch(`${API}/admin/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('pass').value})})
    .then(res=>res.json()).then(d=>{if(d.success){document.getElementById('login').style.display='none';document.getElementById('panel').style.display='block';loadMenu();loadOrders()}else alert('Wrong')})
}
function loadMenu(){fetch(`${API}/menu`).then(res=>res.json()).then(items=>{
    document.getElementById('menu').innerHTML = items.map(i=>`
    <div>${i.name} - ₹${i.price} - ${i.offer}% <button onclick="del('${i._id}')">Delete</button></div>`).join('')})}
function del(id){fetch(`${API}/menu/${id}`,{method:'DELETE'}).then(loadMenu)}
document.getElementById('f').onsubmit=e=>{e.preventDefault();fetch(`${API}/menu`,{method:'POST',body:new FormData(e.target)}).then(loadMenu)}
function loadOrders(){fetch(`${API}/orders`).then(res=>res.json()).then(orders=>{
    document.getElementById('orders').innerHTML = orders.map(o=>`
    <div class="order"><b>${o.trackId}</b> - ${o.name} - ₹${o.total} - ${o.status}
    <select onchange="up('${o._id}',this.value)"><option>Pending</option><option>Preparing</option><option>Delivered</option></select></div>`).join('')})}
function up(id,s){fetch(`${API}/orders/${id}/status`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:s})}).then(loadOrders)}
</script></body></html>
