<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickBite Admin</title>
<style>
    body{font-family:Arial; background:#f4f4f4; padding:20px;}
  .top-bar{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;}
  .top-buttons a{padding:10px 15px; border-radius:5px; text-decoration:none; color:white; margin-left:10px; font-weight:bold;}
  .btn-admin{background:#333;}.btn-owner{background:orange;}
 .card{background:white; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 5px #ccc;}
    input, select, button, textarea{padding:10px; margin:5px; border-radius:5px; border:1px solid #ccc; width:calc(100% - 22px);}
    button{background:#ff5722; color:white; border:none; cursor:pointer;}
    button:hover{opacity:0.9;}
 .grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:15px;}
 .stat-card{background:#ff5722; color:white; text-align:center; padding:20px;}
 .stat-card h2{margin:0; font-size:30px;}
 .order,.menu-item,.rider-item,.owner-item{border:1px solid #ddd; padding:10px; margin:10px 0; border-radius:5px;}
 .btn-green{background:#25D366;}.btn-red{background:#dc3545;}.btn-blue{background:#007bff;}.btn-orange{background:orange;}
 .report-result p{margin:5px 0; font-size:16px;}
 .logout-btn{background:#6c757d; padding:8px 15px; width:auto;}
    small{color:#666; font-size:12px;}
 .rider-docs img{width:70px; height:70px; object-fit:cover; border:1px solid #ccc; border-radius:5px; margin:3px;}
 .menu-item img{width:80px; height:80px; object-fit:cover; border-radius:5px; float:left; margin-right:10px;}
 .rider-map{height:200px; margin-top:10px; border-radius:8px; overflow:hidden; background:#eee;} /* NAYA */
</style>
</head>
<body>

<div class="top-bar">
    <h1>🔥 QuickBite Admin Panel</h1>
    <div class="top-buttons">
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
</div>

<div class="grid">
    <div class="card stat-card"><h3>Total Orders</h3><h2 id="totalOrders">0</h2></div>
    <div class="card stat-card" style="background:#007bff;"><h3>Total Customers</h3><h2 id="totalCustomers">0</h2></div>
</div>

<div class="card">
    <h2>📦 Orders</h2>
    <div id="ordersList">Loading...</div>
</div>

<script>
const API = '';
const ADMIN_PASSWORD = 'admin123';

function checkLogin(){
    if(sessionStorage.getItem('adminLoggedIn')!== 'true'){
        let pass = prompt("🔒 Admin Login\nPassword daalo:");
        if(pass === ADMIN_PASSWORD){ sessionStorage.setItem('adminLoggedIn', 'true'); }
        else { alert("Galat Password!"); window.location = '/'; }
    }
}
function logout(){ sessionStorage.removeItem('adminLoggedIn'); alert("Logout ho gaye"); window.location = '/'; }
checkLogin();

async function loadData(){
    const stats = await fetch(API+'/api/stats').then(r=>r.json()).catch(()=>({orders:0, customers:0}));
    document.getElementById('totalOrders').innerText = stats.orders;
    document.getElementById('totalCustomers').innerText = stats.customers;

    const orders = await fetch(API+'/api/orders').then(r=>r.json());

    let orderHtml = '';
    for(let o of orders){
        orderHtml += `
            <div class="order">
                <b>${o.trackId}</b> - ${o.name} - ₹${o.total} <br>
                <small>${o.phone} | ${o.address}</small> <br>
                <b>Status:</b> ${o.status} | <b>Rider:</b> ${o.riderId || 'Nahi hai'} <br>
                <select onchange="updateStatus('${o._id}', this.value)">
                    <option ${o.status=='Pending'?'selected':''}>Pending</option>
                    <option ${o.status=='Out for Delivery'?'selected':''}>Out for Delivery</option>
                    <option ${o.status=='Delivered'?'selected':''}>Delivered</option>
                </select>
                <a href="/track?id=${o.trackId}" target="_blank"><button class="btn-blue">Track</button></a>
                <!-- MAP YAHI DIKHEGA -->
                ${o.riderLat && o.riderLng ? `
                <div class="rider-map">
                    <iframe width="100%" height="200" frameborder="0" 
                    src="https://www.google.com/maps?q=${o.riderLat},${o.riderLng}&z=15&output=embed"></iframe>
                </div>` : ''}
            </div>
        `;
    }
    document.getElementById('ordersList').innerHTML = orderHtml || 'Koi order nahi';
}

async function updateStatus(id, status){ 
    await fetch(API+`/api/orders/${id}/status`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status})}); 
    alert("Status Updated: " + status); 
    loadData(); 
}

loadData();
setInterval(loadData, 10000); // 10 sec me auto refresh
</script>
</body>
</html>
