<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickBite Admin</title>
<style>
    body{font-family:Arial; background:#f4f4f4; padding:20px;}
    .card{background:white; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow:0 2px 5px #ccc;}
    input, select, button, textarea{padding:10px; margin:5px; border-radius:5px; border:1px solid #ccc; width:calc(100% - 22px);}
    button{background:#ff5722; color:white; border:none; cursor:pointer;}
    button:hover{opacity:0.9;}
    .grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:15px;}
    .stat-card{background:#ff5722; color:white; text-align:center; padding:20px;}
    .stat-card h2{margin:0; font-size:30px;}
    .order, .menu-item{border:1px solid #ddd; padding:10px; margin:10px 0; border-radius:5px;}
    .btn-green{background:#25D366;} .btn-red{background:#dc3545;} .btn-blue{background:#007bff;}
    .report-result p{margin:5px 0; font-size:16px;}
</style>
</head>
<body>

<h1>🔥 QuickBite Admin Panel</h1>

<!-- 1. STATS -->
<div class="grid">
    <div class="card stat-card">
        <h3>Total Orders</h3>
        <h2 id="totalOrders">0</h2>
    </div>
    <div class="card stat-card" style="background:#007bff;">
        <h3>Total Customers</h3>
        <h2 id="totalCustomers">0</h2>
    </div>
</div>

<!-- 2. 3. SALES REPORT NEW -->
<div class="card">
    <h2>📊 Sales Report</h2>
    <div style="display:flex; gap:10px;">
        <input type="date" id="startDate">
        <input type="date" id="endDate">
    </div>
    <button class="btn-blue" onclick="getReport()">Get Report</button>
    <button class="btn-green" onclick="downloadCSV()">Download CSV</button>
    <div id="reportResult" class="report-result"></div>
</div>

<!-- 3. BROADCAST -->
<div class="card">
    <h2>📢 WhatsApp Broadcast</h2>
    <textarea id="broadcastMsg" placeholder="Message likho..." rows="3"></textarea>
    <button class="btn-green" onclick="sendAllBroadcast()">Send to All Customers</button>
    
    <div style="margin-top:15px; padding-top:15px; border-top:1px dashed #ddd;">
        <h4>Send to Specific Numbers</h4>
        <input type="text" id="manualNumbers" placeholder="7061840674, 8507317931">
        <small>Comma se alag alag number likho. 91 lagane ki zarurat nahi</small>
        <button class="btn-green" onclick="sendManualBroadcast()">Send to Selected</button>
    </div>
</div>

<!-- 4. COUPON -->
<div class="card">
    <h2>🎟️ Add Coupon</h2>
    <input type="text" id="couponCode" placeholder="Code: FIRST50">
    <input type="number" id="couponDiscount" placeholder="Discount: 50">
    <select id="couponType"><option value="FLAT">FLAT</option><option value="PERCENT">PERCENT</option></select>
    <button onclick="addCoupon()">Add Coupon</button>
</div>

<!-- 5. MENU -->
<div class="card">
    <h2>🍔 Add New Menu Item</h2>
    <input type="text" id="itemName" placeholder="Item Name">
    <input type="number" id="itemPrice" placeholder="Price">
    <input type="text" id="itemDesc" placeholder="Description">
    <input type="text" id="itemCategory" placeholder="Category: Pizza, Burger">
    <input type="number" id="itemOffer" placeholder="Offer %">
    <input type="file" id="itemImg">
    <button onclick="addItem()">Add Item</button>
    <div id="menuList"></div>
</div>

<!-- 6. ORDERS -->
<div class="card">
    <h2>📦 Orders</h2>
    <div id="ordersList">Loading...</div>
</div>

<script>
const API = '';
let token = 'admin123'; 

async function loadData(){
    // Stats
    const stats = await fetch(API+'/api/stats').then(r=>r.json());
    document.getElementById('totalOrders').innerText = stats.orders;
    document.getElementById('totalCustomers').innerText = stats.customers;

    // Menu
    const menu = await fetch(API+'/api/menu').then(r=>r.json());
    document.getElementById('menuList').innerHTML = menu.map(i=>`
        <div class="menu-item">
            <b>${i.name}</b> - ₹${i.price} - ${i.inStock ? 'In Stock' : 'Out of Stock'}
            <button onclick="toggleStock('${i._id}')">${i.inStock ? 'OFF' : 'ON'}</button>
            <button class="btn-red" onclick="delItem('${i._id}')">Delete</button>
        </div>
    `).join('');

    // Orders
    const orders = await fetch(API+'/api/orders').then(r=>r.json());
    document.getElementById('ordersList').innerHTML = orders.map(o=>`
        <div class="order">
            <b>${o.trackId}</b> - ${o.name} - ₹${o.total} <br>
            <b>Payment:</b> ${o.payment} | <b>Status:</b> ${o.status} | <b>Points:</b> ${o.pointsEarned || 0} <br>
            <small>${o.phone} | ${o.address}</small> <br>
            
            <!-- 2. TRACKING: Rider Location -->
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="text" id="lat-${o._id}" placeholder="Rider Lat" value="${o.riderLat}" style="width:45%">
                <input type="text" id="lng-${o._id}" placeholder="Rider Lng" value="${o.riderLng}" style="width:45%">
            </div>

            <select onchange="updateStatus('${o._id}', this.value)">
                <option ${o.status=='Pending'?'selected':''}>Pending</option>
                <option ${o.status=='Preparing'?'selected':''}>Preparing</option>
                <option ${o.status=='Out for Delivery'?'selected':''}>Out for Delivery</option>
                <option ${o.status=='Delivered'?'selected':''}>Delivered</option>
            </select>
            <a href="/order-details?id=${o.trackId}" target="_blank"><button class="btn-blue">Track</button></a>
            <button class="btn-red" onclick="delOrder('${o._id}')">Delete</button>
        </div>
    `).join('');
}

// 3. REPORT FUNCTIONS
async function getReport(){
  let s = document.getElementById('startDate').value;
  let e = document.getElementById('endDate').value;
  if(!s || !e) return alert('Start aur End date select karo');
  const d = await fetch(`${API}/api/report?start=${s}&end=${e}`).then(r=>r.json());
  document.getElementById('reportResult').innerHTML = `
    <p><b>Total Revenue:</b> ₹${d.totalRevenue}</p>
    <p><b>Total Orders:</b> ${d.totalOrders}</p>
    <p><b>Top Item:</b> ${d.topItems[0]?.[0] || 'N/A'} - ${d.topItems[0]?.[1] || 0} sold</p>
  `
}
function downloadCSV(){
  let s = document.getElementById('startDate').value;
  let e = document.getElementById('endDate').value;
  if(!s || !e) return alert('Start aur End date select karo');
  window.open(`${API}/api/report/download?start=${s}&end=${e}`)
}

async function sendAllBroadcast(){
    const message = document.getElementById('broadcastMsg').value;
    if(!message) return alert('Message likho');
    const res = await fetch(API+'/api/broadcast', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message, type:'all'})});
    const data = await res.json();
    alert(`${data.count} customers ko link ban gaye`);
    data.links.forEach(link => window.open(link, '_blank'));
}

async function sendManualBroadcast(){
    const message = document.getElementById('broadcastMsg').value;
    const numbers = document.getElementById('manualNumbers').value;
    if(!message || !numbers) return alert('Message aur Number dono bharo');
    const res = await fetch(API+'/api/broadcast', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message, type:'manual', numbers})});
    const data = await res.json();
    alert(`${data.count} logo ko link ban gaye`);
    data.links.forEach(link => window.open(link, '_blank'));
}

async function addCoupon(){
    const body = {code:couponCode.value, discount:+couponDiscount.value, type:couponType.value};
    await fetch(API+'/api/coupon', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    alert('Coupon Added'); couponCode.value='';
}
async function addItem(){
    const fd = new FormData();
    fd.append('name', itemName.value); fd.append('price', itemPrice.value); fd.append('desc', itemDesc.value);
    fd.append('category', itemCategory.value); fd.append('offer', itemOffer.value); fd.append('img', itemImg.files[0]);
    await fetch(API+'/api/menu', {method:'POST', body:fd}); alert('Item Added'); loadData();
}
async function toggleStock(id){ await fetch(API+`/api/menu/${id}/stock`, {method:'PUT'}); loadData(); }
async function delItem(id){ if(confirm('Delete?')){ await fetch(API+`/api/menu/${id}`, {method:'DELETE'}); loadData(); }}

// 2. STATUS UPDATE ME LOCATION BHI BHEJ RAHE
async function updateStatus(id, status){ 
    const riderLat = document.getElementById(`lat-${id}`).value;
    const riderLng = document.getElementById(`lng-${id}`).value;
    const res = await fetch(API+`/api/orders/${id}/status`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status, riderLat, riderLng})});
    const data = await res.json();
    if(data.customerWaLink) window.open(data.customerWaLink, '_blank');
    loadData();
}
async function delOrder(id){ if(confirm('Delete?')){ await fetch(API+`/api/orders/${id}`, {method:'DELETE'}); loadData(); }}
function openWA(link){ if(link) window.open(link, '_blank'); }

loadData();
setInterval(loadData, 10000); // 10 sec me auto refresh
</script>
</body>
</html>
