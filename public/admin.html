<!DOCTYPE html><html><head><title>Admin Panel</title>
<style>body{font-family:Arial;background:#f4f4f4;padding:20px} .login,.panel{max-width:1100px;margin:auto;background:white;padding:20px;border-radius:8px}
input,button,select{padding:10px;margin:5px;border:1px solid #ddd;border-radius:5px} button{background:#ff6600;color:white;border:none;cursor:pointer}
.order{border:1px solid #ddd;padding:15px;margin:10px 0;border-radius:5px} .Pending{color:orange} .Preparing{color:blue} .Delivered{color:green}</style>
</head><body>

<div class="login" id="login">
<h2>Admin Login</h2><input type="password" id="pass" placeholder="Password: admin123">
<button onclick="login()">Login</button></div>

<div class="panel" id="panel" style="display:none">
<h2>Manage Menu - Add New Item</h2>
<form id="f"><input name="name" placeholder="Item Name" required><input name="price" type="number" placeholder="Price" required>
<input name="desc" placeholder="Description"><input name="offer" type="number" placeholder="Offer %">
<input name="img" type="file" required><button>Add Item</button></form>
<h3>All Menu Items</h3><div id="menu"></div><hr><h2>All Orders</h2><div id="orders"></div>
</div>

<script>
const API = 'https://quickbite-ymqk.onrender.com/api';
function login(){
    fetch(`${API}/admin/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('pass').value})})
    .then(res=>res.json()).then(d=>{if(d.success){document.getElementById('login').style.display='none';document.getElementById('panel').style.display='block';loadMenu();loadOrders()}else alert('Wrong Password')})
}
function loadMenu(){fetch(`${API}/menu`).then(res=>res.json()).then(items=>{
    document.getElementById('menu').innerHTML = items.map(i=>`
    <div style="border:1px solid #eee;padding:10px;margin:5px;display:flex;justify-content:space-between;align-items:center"><img src="${i.img}" width="50"><b>${i.name}</b> - ₹${i.price} - ${i.offer}% <button onclick="del('${i._id}')">Delete</button></div>`).join('')})}
function del(id){if(confirm('Delete?'))fetch(`${API}/menu/${id}`,{method:'DELETE'}).then(loadMenu)}
document.getElementById('f').onsubmit=e=>{e.preventDefault();fetch(`${API}/menu`,{method:'POST',body:new FormData(e.target)}).then(()=>{e.target.reset();loadMenu()})}
function loadOrders(){fetch(`${API}/orders`).then(res=>res.json()).then(orders=>{
    document.getElementById('orders').innerHTML = orders.map(o=>`
    <div class="order"><b>${o.trackId}</b> - ${o.name} - ${o.phone} - ₹${o.total} - <span class="${o.status}">${o.status}</span><br>
    ${o.items.map(i=>`${i.name} x${i.qty}`).join(', ')}<br>
    <select onchange="up('${o._id}',this.value)"><option ${o.status=='Pending'?'selected':''}>Pending</option><option ${o.status=='Preparing'?'selected':''}>Preparing</option><option ${o.status=='Delivered'?'selected':''}>Delivered</option></select>
    <button onclick="delOrder('${o._id}')" style="background:red">Delete</button></div>`).join('')})}
function up(id,s){fetch(`${API}/orders/${id}/status`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:s})}).then(loadOrders)}
function delOrder(id){if(confirm('Delete Order?'))fetch(`${API}/orders/${id}`,{method:'DELETE'}).then(loadOrders)}
</script></body></html>
